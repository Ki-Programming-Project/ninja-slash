<!DOCTYPE html>
<html lang="ja">
<head>
<!--
  NINJA SLASH - 忍斬
  v1.1.1
  Genre: Roguelike Action
  Author: Claude (Anthropic)
  Architecture: State Machine + Object Pool + Web Audio API

  v1.1.1 Changes:
  - [FIX] bgCache TDZ ReferenceError: moved let declaration before resizeCanvas() call
  - [FIX] OnlineRanking stub firing fetch() on placeholder URL (ERR_NAME_NOT_RESOLVED)
        → added isStub() guard; fetch skipped until real API_BASE is configured
  - [IMPROVE] PC browser cursor: crosshair on game canvas via
        @media (hover: hover) and (pointer: fine)

  v1.1.0 Changes:
  - [NEW] Weapon system: Sword / Shuriken / Scythe with unique playfeel
  - [NEW] Coin drop from enemies + in-game weapon shop (levelup screen)
  - [NEW] Passive skill selection (roguelike 3-choice system)
  - [NEW] Stage progression: Night → Storm → Burning Castle (score-based)
  - [NEW] Combo BGM layering via Web Audio API (5/10/20 combo thresholds)
  - [NEW] Haptic feedback via navigator.vibrate()
  - [NEW] Daily Challenge with seeded rules + localStorage date management
  - [NEW] Online ranking stub (Supabase-ready API structure)
  - [NEW] LEVELUP state added to STATE machine
  - [NEW] Coin pool + coin render system
  - [IMPROVE] Death cause display
  - [IMPROVE] Instant retry (1-tap from result screen)
  - [IMPROVE] "Almost beat it" UI (shows delta to best score)
  - [REFACTOR] Background rendering split by stage
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>忍斬 NINJA SLASH</title>
<style>
/* ============================================================
   RESET & ROOT
============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg:       #0a0a0f;
  --c-panel:    #12121a;
  --c-border:   #2a2a3a;
  --c-ink:      #ffffff;
  --c-dim:      rgba(255,255,255,0.45);
  --c-red:      #ff2244;
  --c-orange:   #ff7722;
  --c-gold:     #ffd700;
  --c-cyan:     #00e5ff;
  --c-purple:   #aa44ff;
  --c-green:    #44ff88;
  --c-hp1:      #ff2244;
  --c-hp2:      #ff7722;
  --c-hp3:      #44ff88;
  --font-ja:    'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
  --font-mono:  'SF Mono', 'Fira Code', 'Courier New', monospace;
  --shake-x:    0px;
  --shake-y:    0px;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--c-bg);
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-ja);
}

/* ============================================================
   CANVAS WRAPPER
============================================================ */
#game-wrap {
  position: relative;
  width: 100vw;
  height: 100vh;
  max-width: 480px;
  overflow: hidden;
  transform: translate(var(--shake-x), var(--shake-y));
  will-change: transform;
}

#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: none;
}

/* PC / mouse environment: show crosshair for targeting */
@media (hover: hover) and (pointer: fine) {
  #game-canvas { cursor: crosshair; }
}

/* ============================================================
   SCREENS
============================================================ */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s ease;
  z-index: 10;
}
.screen.active {
  opacity: 1;
  pointer-events: auto;
}

/* ============================================================
   TITLE SCREEN
============================================================ */
#screen-title {
  background: radial-gradient(ellipse at 50% 30%, #1a0a0f 0%, #0a0a0f 70%);
}

.title-deco {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}
.title-deco::before {
  content: '';
  position: absolute;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,34,68,0.08) 0%, transparent 70%);
  animation: pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
  50%      { opacity: 1;   transform: translateX(-50%) scale(1.15); }
}

.title-mon {
  font-size: clamp(60px, 18vw, 96px);
  letter-spacing: 0.15em;
  color: var(--c-ink);
  text-shadow:
    0 0 20px rgba(255,34,68,0.8),
    0 0 60px rgba(255,34,68,0.4),
    0 2px 0 rgba(255,34,68,0.9);
  animation: title-flicker 4s ease-in-out infinite;
  position: relative;
  z-index: 1;
  line-height: 1;
}
@keyframes title-flicker {
  0%,96%,100% { opacity: 1; }
  97%          { opacity: 0.7; }
  98%          { opacity: 1; }
  99%          { opacity: 0.5; }
}

.title-sub {
  font-family: var(--font-mono);
  font-size: clamp(11px, 3vw, 14px);
  letter-spacing: 0.5em;
  color: var(--c-dim);
  text-transform: uppercase;
  margin-top: 8px;
  position: relative;
  z-index: 1;
}

.title-divider {
  width: 120px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--c-red), transparent);
  margin: 20px 0 16px;
}

/* v1.1.0: Daily challenge badge on title */
.daily-badge {
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 1px solid var(--c-purple);
  border-radius: 4px;
  padding: 8px 16px;
  margin-bottom: 14px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  color: var(--c-purple);
  box-shadow: 0 0 12px rgba(170,68,255,0.2);
  position: relative;
  z-index: 1;
}
.daily-badge span {
  display: block;
  font-size: 10px;
  color: var(--c-dim);
  margin-top: 2px;
  letter-spacing: 0.1em;
}

.diff-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.4em;
  color: var(--c-dim);
  margin-bottom: 12px;
  text-transform: uppercase;
}

.diff-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.diff-btn {
  padding: 8px 20px;
  border: 1px solid var(--c-border);
  background: transparent;
  color: var(--c-dim);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.diff-btn.selected,
.diff-btn:hover {
  background: var(--c-red);
  border-color: var(--c-red);
  color: #fff;
  box-shadow: 0 0 15px rgba(255,34,68,0.5);
}

.title-btn-row {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}

.start-btn {
  padding: 16px 48px;
  background: var(--c-red);
  color: #fff;
  font-family: var(--font-ja);
  font-size: clamp(18px, 5vw, 22px);
  letter-spacing: 0.3em;
  border: none;
  cursor: pointer;
  border-radius: 2px;
  box-shadow: 0 0 25px rgba(255,34,68,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
  animation: btn-breathe 2s ease-in-out infinite;
}
@keyframes btn-breathe {
  0%,100% { box-shadow: 0 0 25px rgba(255,34,68,0.6), inset 0 1px 0 rgba(255,255,255,0.15); }
  50%      { box-shadow: 0 0 45px rgba(255,34,68,0.9), inset 0 1px 0 rgba(255,255,255,0.15); }
}
.start-btn:active { transform: scale(0.96); }

/* v1.1.0: Daily challenge start button */
.daily-start-btn {
  padding: 16px 20px;
  background: rgba(170,68,255,0.15);
  color: var(--c-purple);
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  border: 1px solid var(--c-purple);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.daily-start-btn:active { transform: scale(0.95); }

.title-ranking-preview {
  margin-top: 20px;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-dim);
  letter-spacing: 0.1em;
  min-height: 50px;
}
.title-ranking-preview span {
  display: block;
  color: var(--c-gold);
  font-size: 13px;
  margin-bottom: 4px;
  letter-spacing: 0.3em;
}

/* ============================================================
   HUD (in-game overlay)
============================================================ */
#hud {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}

.hud-top {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 16px 20px 0;
}

.hud-score-wrap {
  display: flex;
  flex-direction: column;
}
.hud-score-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.35em;
  color: var(--c-dim);
  text-transform: uppercase;
}
.hud-score {
  font-family: var(--font-mono);
  font-size: clamp(22px, 6vw, 30px);
  color: var(--c-ink);
  letter-spacing: 0.05em;
  line-height: 1.1;
  text-shadow: 0 0 15px rgba(255,255,255,0.3);
  transition: color 0.1s;
}
.hud-score.crit { color: var(--c-gold); text-shadow: 0 0 20px rgba(255,215,0,0.8); }

.hud-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 6px;
}

.hud-hp-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.hp-gem {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--c-hp3);
  box-shadow: 0 0 8px var(--c-hp3);
  transition: all 0.2s;
}
.hp-gem.empty {
  background: transparent;
  border: 1px solid var(--c-border);
  box-shadow: none;
}

.hud-timer {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.2em;
  color: var(--c-dim);
}
.hud-timer.warning { color: var(--c-red); animation: blink 0.5s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* v1.1.0: Coin display in HUD */
.hud-coin-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--c-gold);
}
.hud-coin-icon {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--c-gold);
  box-shadow: 0 0 6px rgba(255,215,0,0.7);
}

/* v1.1.0: Weapon indicator in HUD */
.hud-weapon-row {
  display: flex;
  align-items: center;
  gap: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-dim);
}
.hud-weapon-icon { font-size: 16px; line-height: 1; }
.hud-weapon-name { letter-spacing: 0.1em; }

/* Combo display */
.hud-combo-wrap {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  transition: opacity 0.3s;
}
.hud-combo-num {
  font-family: var(--font-mono);
  font-size: clamp(48px, 14vw, 72px);
  font-weight: 900;
  color: var(--c-orange);
  line-height: 1;
  text-shadow:
    0 0 20px rgba(255,119,34,0.9),
    0 0 50px rgba(255,119,34,0.5);
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.1s, transform 0.15s cubic-bezier(0.2,1.5,0.5,1);
}
.hud-combo-num.show {
  opacity: 1;
  transform: scale(1);
}
.hud-combo-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--c-orange);
  opacity: 0.7;
}

/* Skill button */
.hud-skill-btn {
  position: absolute;
  bottom: 28px;
  right: 24px;
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2px solid var(--c-border);
  background: rgba(10,10,15,0.85);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.1s;
  overflow: hidden;
}
.hud-skill-btn::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 0%;
  background: rgba(0,229,255,0.25);
  transition: height linear;
}
.hud-skill-btn.charging::before { height: 100%; }
.hud-skill-btn.ready { border-color: var(--c-cyan); box-shadow: 0 0 15px rgba(0,229,255,0.5); }
.hud-skill-btn.cooldown { opacity: 0.4; }
.skill-icon { font-size: 22px; line-height: 1; }
.skill-label {
  font-family: var(--font-mono);
  font-size: 8px;
  letter-spacing: 0.1em;
  color: var(--c-dim);
  margin-top: 1px;
}
.skill-cd-text {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-cyan);
  position: absolute;
}

/* v1.1.0: Stage indicator */
#stage-indicator {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-ja);
  font-size: clamp(20px, 6vw, 28px);
  color: #fff;
  letter-spacing: 0.3em;
  text-shadow: 0 0 20px rgba(255,120,0,0.9);
  opacity: 0;
  pointer-events: none;
  z-index: 9;
  white-space: nowrap;
  text-align: center;
}

/* Slow-time overlay */
#slow-overlay {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(100,50,255,0.12) 100%);
  border: 2px solid rgba(100,50,255,0.3);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 4;
}
#slow-overlay.active { opacity: 1; }

#skill-flash {
  position: absolute;
  inset: 0;
  background: rgba(0,229,255,0.15);
  pointer-events: none;
  opacity: 0;
  z-index: 6;
}

#boss-warning {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-ja);
  font-size: clamp(24px, 7vw, 36px);
  color: var(--c-red);
  letter-spacing: 0.3em;
  text-shadow: 0 0 20px rgba(255,34,68,0.9);
  opacity: 0;
  pointer-events: none;
  z-index: 8;
  white-space: nowrap;
}

/* ============================================================
   v1.1.0: LEVELUP SCREEN (Passive skill 3-choice)
============================================================ */
#screen-levelup {
  background: rgba(5,5,15,0.95);
  z-index: 20;
}

.levelup-title {
  font-size: clamp(14px, 4vw, 18px);
  letter-spacing: 0.5em;
  color: var(--c-gold);
  text-transform: uppercase;
  font-family: var(--font-mono);
  margin-bottom: 6px;
  text-shadow: 0 0 15px rgba(255,215,0,0.7);
}
.levelup-sub {
  font-size: clamp(20px, 6vw, 28px);
  letter-spacing: 0.2em;
  color: var(--c-ink);
  margin-bottom: 28px;
}

.skill-choices {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: min(90vw, 340px);
}

.skill-choice-btn {
  background: var(--c-panel);
  border: 1px solid var(--c-border);
  border-radius: 6px;
  padding: 16px 20px;
  cursor: pointer;
  text-align: left;
  transition: all 0.12s;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  gap: 14px;
}
.skill-choice-btn:active {
  transform: scale(0.97);
  border-color: var(--c-cyan);
  background: rgba(0,229,255,0.08);
}
.skill-choice-icon {
  font-size: 28px;
  width: 40px;
  text-align: center;
  flex-shrink: 0;
}
.skill-choice-body {}
.skill-choice-name {
  font-family: var(--font-mono);
  font-size: 14px;
  letter-spacing: 0.2em;
  color: var(--c-ink);
  text-transform: uppercase;
}
.skill-choice-desc {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--c-dim);
  margin-top: 3px;
  letter-spacing: 0.05em;
}

/* ============================================================
   RESULT SCREEN
============================================================ */
#screen-result {
  background: rgba(10,10,15,0.96);
  overflow-y: auto;
  padding: 20px 0;
  justify-content: flex-start;
}

.result-title {
  font-size: clamp(28px, 8vw, 40px);
  letter-spacing: 0.3em;
  color: var(--c-ink);
  text-shadow: 0 0 20px rgba(255,34,68,0.6);
  margin-bottom: 4px;
  margin-top: 16px;
}
.result-rank-badge {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.4em;
  color: var(--c-gold);
  text-transform: uppercase;
  margin-bottom: 10px;
  min-height: 18px;
}

/* v1.1.0: Death cause display */
.result-death-cause {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--c-red);
  letter-spacing: 0.15em;
  margin-bottom: 16px;
  opacity: 0.8;
}

/* v1.1.0: "Almost!" delta to best */
.result-almost {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--c-orange);
  letter-spacing: 0.1em;
  margin-bottom: 12px;
  min-height: 18px;
}

.result-stats {
  width: 260px;
  border: 1px solid var(--c-border);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 14px;
}
.result-stat-row {
  display: flex;
  justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--c-border);
  font-family: var(--font-mono);
  font-size: 13px;
}
.result-stat-row:last-child { border-bottom: none; }
.result-stat-row span:first-child { color: var(--c-dim); letter-spacing: 0.1em; }
.result-stat-row span:last-child  { color: var(--c-ink); }
.result-stat-row.highlight span:last-child { color: var(--c-gold); }

.result-ranking {
  width: 260px;
  margin-bottom: 20px;
}
.ranking-header {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.4em;
  color: var(--c-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
  text-align: center;
}
.ranking-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  font-family: var(--font-mono);
  font-size: 12px;
  border-radius: 2px;
}
.ranking-row.current-run {
  background: rgba(255,215,0,0.1);
  border: 1px solid rgba(255,215,0,0.3);
}
.rank-num  { color: var(--c-dim); width: 24px; }
.rank-score{ color: var(--c-ink); }
.rank-diff { color: var(--c-dim); font-size: 10px; }

.result-btns {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.retry-btn {
  padding: 18px 44px;
  background: var(--c-red);
  color: #fff;
  font-family: var(--font-ja);
  font-size: 20px;
  letter-spacing: 0.3em;
  border: none;
  cursor: pointer;
  border-radius: 2px;
  box-shadow: 0 0 20px rgba(255,34,68,0.5);
  -webkit-tap-highlight-color: transparent;
  transition: all 0.1s;
  animation: btn-breathe 2s ease-in-out infinite;
}
.retry-btn:active { transform: scale(0.95); }
.title-back-btn {
  padding: 14px 20px;
  background: transparent;
  color: var(--c-dim);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.2em;
  border: 1px solid var(--c-border);
  cursor: pointer;
  border-radius: 2px;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.1s;
}
.title-back-btn:active { opacity: 0.6; }

/* ============================================================
   MISC
============================================================ */
.new-record-flash {
  position: absolute;
  top: 10%;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-ja);
  font-size: clamp(20px, 6vw, 28px);
  color: var(--c-gold);
  text-shadow: 0 0 20px rgba(255,215,0,0.9);
  letter-spacing: 0.3em;
  opacity: 0;
  animation: record-pop 2.5s ease forwards;
  pointer-events: none;
  white-space: nowrap;
  z-index: 30;
}
@keyframes record-pop {
  0%   { opacity: 0; transform: translateX(-50%) scale(0.5); }
  20%  { opacity: 1; transform: translateX(-50%) scale(1.1); }
  40%  { transform: translateX(-50%) scale(1); }
  70%  { opacity: 1; }
  100% { opacity: 0; transform: translateX(-50%) scale(1); }
}

/* Scanline effect */
#scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,

/* ----------------------------------------------------------------
   v1.1.0: DAILY CHALLENGE SYSTEM
   seed-based daily rule generation
---------------------------------------------------------------- */
const Daily = (() => {
  const LS_KEY_DAILY = 'ninjaSlash_v11_daily';

  // Seeded pseudo-random (simple LCG)
  function seededRand(seed) {
    let s = seed;
    return () => {
      s = (s * 1664525 + 1013904223) & 0xffffffff;
      return (s >>> 0) / 0xffffffff;
    };
  }

  const DAILY_RULES = [
    { id: 'normal_only',   label: '忍のみ',      desc: '通常敵のみ出現',    filter: (type) => type.id === 'normal' },
    { id: 'fast_only',     label: '迅のみ',      desc: '高速敵のみ出現',    filter: (type) => type.id === 'fast' },
    { id: 'time_attack',   label: 'タイムアタック', desc: '60秒でハイスコア', timeLimit: 60000 },
    { id: 'no_damage',     label: 'ノーダメージ', desc: '1度もミスせずに',   noDamage: true },
    { id: 'combo_master',  label: 'コンボ道',     desc: '20コンボを目指せ',  comboTarget: 20 },
    { id: 'coin_rush',     label: 'コイン収集',   desc: 'コインを集めろ',    coinMode: true },
  ];

  function getTodayDate() {
    const d = new Date();
    return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  }

  function getTodayRule() {
    const today = getTodayDate();
    const seed = today.split('-').reduce((a,b) => a * 100 + parseInt(b), 0);
    const r = seededRand(seed);
    const idx = Math.floor(r() * DAILY_RULES.length);
    return DAILY_RULES[idx];
  }

  function loadRecord() {
    try { return JSON.parse(localStorage.getItem(LS_KEY_DAILY)) || {}; }
    catch { return {}; }
  }

  function saveRecord(rule, score) {
    const rec = loadRecord();
    const today = getTodayDate();
    if (!rec[today] || rec[today].score < score) {
      rec[today] = { rule: rule.id, score, completed: true };
      try { localStorage.setItem(LS_KEY_DAILY, JSON.stringify(rec)); } catch {}
    }
  }

  function todayCompleted() {
    const rec = loadRecord();
    return rec[getTodayDate()] || null;
  }

  return { getTodayRule, saveRecord, todayCompleted };
})();

/* ----------------------------------------------------------------
   v1.1.0: COMBO BGM SYSTEM
   Layers are added at combo thresholds via Web Audio
   Architecture: master gain → individual layer gains
---------------------------------------------------------------- */
const ComboBGM = (() => {
  let ctx = null;
  let masterGain = null;
  let layers = [];       // { osc, gain, active }
  let currentComboLevel = 0;
  let isRunning = false;

  // BGM layer definitions (frequency, waveform, base volume)
  const LAYER_DEFS = [
    // Layer 0: always-on ambient drone (very quiet)
    { freq: 55,  type: 'sawtooth', vol: 0.04, comboThreshold: 0 },
    // Layer 1: bass rhythm (combo >= 5)
    { freq: 110, type: 'square',   vol: 0.06, comboThreshold: 5 },
    // Layer 2: mid melody (combo >= 10)
    { freq: 220, type: 'triangle', vol: 0.05, comboThreshold: 10 },
    // Layer 3: high shimmer (combo >= 20)
    { freq: 440, type: 'sine',     vol: 0.07, comboThreshold: 20 },
  ];

  function init(audioCtx) {
    if (ctx) return;
    ctx = audioCtx;
    masterGain = ctx.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(ctx.destination);

    layers = LAYER_DEFS.map(def => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      // Add gentle LFO for movement
      const lfo  = ctx.createOscillator();
      const lfoG = ctx.createGain();
      lfo.frequency.value = 0.5 + Math.random() * 0.5;
      lfoG.gain.value = 3 + Math.random() * 4;
      lfo.connect(lfoG);
      lfoG.connect(osc.frequency);
      lfo.start();

      osc.type = def.type;
      osc.frequency.value = def.freq;
      gain.gain.value = 0;
      osc.connect(gain);
      gain.connect(masterGain);
      osc.start();
      return { osc, gain, def, active: false };
    });
  }

  function start() {
    if (!ctx || isRunning) return;
    isRunning = true;
    masterGain.gain.setTargetAtTime(0.7, ctx.currentTime, 0.5);
    updateLayers(0);
  }

  function stop() {
    if (!ctx || !isRunning) return;
    isRunning = false;
    currentComboLevel = -1;
    masterGain.gain.setTargetAtTime(0, ctx.currentTime, 0.4);
    layers.forEach(l => {
      l.gain.gain.setTargetAtTime(0, ctx.currentTime, 0.3);
      l.active = false;
    });
  }

  function updateLayers(combo) {
    if (!ctx || !isRunning) return;
    layers.forEach(l => {
      const shouldActive = combo >= l.def.comboThreshold;
      if (shouldActive !== l.active) {
        l.active = shouldActive;
        const targetVol = shouldActive ? l.def.vol : 0;
        l.gain.gain.setTargetAtTime(targetVol, ctx.currentTime, 0.3);
      }
    });
  }

  // Call on combo change
  function onComboChange(combo) {
    if (!ctx) return;
    const newLevel = combo >= 20 ? 3 : combo >= 10 ? 2 : combo >= 5 ? 1 : 0;
    if (newLevel !== currentComboLevel) {
      currentComboLevel = newLevel;
      updateLayers(combo);
    }
  }

  function onComboReset() {
    if (!ctx) return;
    currentComboLevel = 0;
    updateLayers(0);
  }

  return { init, start, stop, onComboChange, onComboReset };
})();

/* ----------------------------------------------------------------
   AUDIO ENGINE (SFX)
---------------------------------------------------------------- */
const Audio = (() => {
  let ctx = null;
  const init = () => {
    if (!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      ComboBGM.init(ctx);
    }
    if (ctx.state === 'suspended') ctx.resume();
  };

  const tone = (freq, type, duration, vol=0.4) => {
    if (!ctx) return;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const t = ctx.currentTime;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + duration);
  };

  const noise = (duration, vol=0.3, bandFreq=800) => {
    if (!ctx) return;
    const buf  = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    src.buffer = buf;
    filt.type  = 'bandpass';
    filt.frequency.value = bandFreq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(filt);
    filt.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  };

  return {
    init,
    hit(combo=1, weaponId='sword') {
      const base = 380 + Math.min(combo, 12) * 45;
      // v1.1.0: Weapon-specific hit sound
      if (weaponId === 'shuriken') {
        tone(base * 1.5, 'sine', 0.06, 0.22);
        noise(0.04, 0.12, 1400);
      } else if (weaponId === 'scythe') {
        tone(base * 0.7, 'sawtooth', 0.12, 0.25);
        noise(0.1, 0.2, 400);
      } else {
        tone(base, 'square', 0.08, 0.28);
        noise(0.06, 0.18);
        tone(base * 2, 'sine', 0.05, 0.12);
      }
    },
    crit() {
      tone(900, 'sawtooth', 0.06, 0.4);
      tone(1350, 'sine', 0.1, 0.25);
      noise(0.08, 0.25);
    },
    miss() {
      tone(120, 'sawtooth', 0.3, 0.5);
      tone(80, 'sine', 0.35, 0.35);
    },
    bossAppear() {
      tone(220, 'sawtooth', 0.15, 0.5);
      tone(165, 'square', 0.3, 0.4);
      tone(110, 'sawtooth', 0.5, 0.35);
    },
    skill() {
      tone(660, 'sine', 0.08, 0.4);
      tone(880, 'sine', 0.12, 0.3);
      tone(1100, 'sine', 0.18, 0.2);
      noise(0.2, 0.15);
    },
    comboMilestone() {
      tone(440, 'triangle', 0.08, 0.3);
      tone(550, 'triangle', 0.12, 0.25);
      tone(660, 'triangle', 0.16, 0.2);
    },
    gameOver() {
      tone(220, 'sawtooth', 0.5, 0.5);
      tone(165, 'sine', 0.8, 0.4);
      tone(110, 'sawtooth', 1.0, 0.3);
    },
    slowTime() {
      tone(330, 'sine', 0.4, 0.25);
      tone(220, 'sine', 0.6, 0.2);
    },
    uiTap() {
      tone(660, 'sine', 0.05, 0.15);
    },
    coin() {
      tone(880, 'sine', 0.08, 0.2);
      tone(1100, 'sine', 0.06, 0.12);

    // v1.1.0: Stage transition
    stageTransition() {

})();

/* ----------------------------------------------------------------
   OBJECT POOL FACTORY
---------------------------------------------------------------- */
function createPool(size, factory) {
  const pool = Array.from({ length: size }, factory);
  const active = [];

  return {
    acquire() {
      for (let i = 0; i < pool.length; i++) {
        if (!pool[i].active) {
          pool[i].active = true;
          active.push(pool[i]);
          return pool[i];
        }
      }
      return null;
    },
    release(obj) {
      obj.active = false;
      const idx = active.indexOf(obj);
      if (idx !== -1) active.splice(idx, 1);
    },
    releaseAll() {
      for (const o of active) o.active = false;
      active.length = 0;
    },
    get list() { return active; },
  };
}

  { id:'normal',  label:'忍',  hpMax:1, baseSpeed:2.0, size:52, scoreBase:100, coinValue:5,  color:'#e0e0e0', weight:40 },
  { id:'fast',    label:'迅',  hpMax:1, baseSpeed:3.5, size:42, scoreBase:150, coinValue:8,  color:'#44aaff', weight:25 },
  { id:'heavy',   label:'豪',  hpMax:2, baseSpeed:1.3, size:68, scoreBase:220, coinValue:15, color:'#ff8844', weight:20 },

const BOSS_TYPE = {
  id:'boss', label:'頭', hpMax:5, baseSpeed:0.9, size:88, scoreBase:1200, coinValue:80, color:'#ff2244', isBoss:true,
};

const ENEMY_TOTAL_WEIGHT = ENEMY_TYPES.reduce((s,e)=>s+e.weight, 0);
function pickEnemyType(dailyRule=null) {
  // v1.1.0: Daily rule can filter enemy types
  let eligible = ENEMY_TYPES;
  if (dailyRule && dailyRule.filter) {
    const filtered = ENEMY_TYPES.filter(dailyRule.filter);
    if (filtered.length > 0) eligible = filtered;
  }
  const total = eligible.reduce((s,e)=>s+e.weight, 0);
  let r = Math.random() * total;
  for (const e of eligible) { r -= e.weight; if (r <= 0) return e; }
  return eligible[0];
}

/* ----------------------------------------------------------------

---------------------------------------------------------------- */
function emitSlash(x, y, count, color='#ffffff', isCrit=false) {
  const num = isCrit ? count * 2 : count;
  for (let i = 0; i < num; i++) {
    const p = particlePool.acquire();
    if (!p) break;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * (isCrit ? 8 : 5);
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.size = isCrit ? 2 + Math.random() * 5 : 1.5 + Math.random() * 3.5;
    p.alpha = 1;
    p.decay = 0.025 + Math.random() * 0.04;
    p.color = isCrit ? '#ffd700' : color;
    p.shape = i < 3 ? 'slash' : 'circle';
    p.rotation = Math.random() * Math.PI * 2;
    p.rotSpeed = (Math.random() - 0.5) * 0.3;
  }
}

function emitBlood(x, y) {
  for (let i = 0; i < 8; i++) {
    const p = particlePool.acquire();
    if (!p) break;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * (1 + Math.random() * 4);
    p.vy = Math.sin(angle) * (1 + Math.random() * 4);
    p.size = 3 + Math.random() * 4;
    p.alpha = 0.9;
    p.decay = 0.018;
    p.color = '#cc1133';
    p.shape = 'circle';
    p.rotation = 0; p.rotSpeed = 0;
  }
}

function emitSkillWave(cx, cy) {
  for (let i = 0; i < 48; i++) {
    const p = particlePool.acquire();
    if (!p) break;
    const angle = (i / 48) * Math.PI * 2;
    const speed = 4 + Math.random() * 10;
    p.x = cx; p.y = cy;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.size = 2 + Math.random() * 6;
    p.alpha = 1;
    p.decay = 0.02;

---------------------------------------------------------------- */
function dropCoin(x, y, value) {
  const c = coinPool.acquire();
  if (!c) return;
  c.x = x;
  c.y = y;
  c.vx = (Math.random() - 0.5) * 4;
  c.vy = -(2 + Math.random() * 3);
  c.value = value;
  c.alpha = 1;
  c.size = 8;
  c.life = 0;
  c.maxLife = 180;
  c.collected = false;
}

function updateCoins(dt) {
  for (const c of [...coinPool.list]) {
    if (c.collected) {
      // Float towards center (magnet effect)
      const dx = W/2 - c.x;
      const dy = H/2 - c.y;
      const dist = Math.hypot(dx, dy);
      if (dist < 40) {
        // Collect
        gs.coins += c.value;
        updateCoinHUD();
        Audio.coin();
        coinPool.release(c);
        continue;
      }
      c.vx += (dx / dist) * 4;
      c.vy += (dy / dist) * 4;
    } else {
      c.vy += 0.15; // gravity
    }
    c.x += c.vx;
    c.y += c.vy;
    c.vx *= 0.94;
    c.life++;

    // Auto-magnet if passiveCoinBonus or close enough
    const dxP = W/2 - c.x;
    const dyP = H/2 - c.y;
    const distP = Math.hypot(dxP, dyP);
    const magnetRange = gs.passiveCoinBonus ? 200 : 80;
    if (distP < magnetRange && !c.collected) {
      c.collected = true;
    }

    if (c.life >= c.maxLife || c.y > H + 50) {
      coinPool.release(c);
    }
  }
}

let shakeX = 0, shakeY = 0;

function triggerShake(intensity=6) {
  shakeX = (Math.random() - 0.5) * intensity * 2;
  shakeY = (Math.random() - 0.5) * intensity * 2;
}

function updateShake() {
  if (Math.abs(shakeX) > 0.3 || Math.abs(shakeY) > 0.3) {
    shakeX *= 0.72;
    shakeY *= 0.72;
    wrap.style.setProperty('--shake-x', shakeX.toFixed(2) + 'px');
    wrap.style.setProperty('--shake-y', shakeY.toFixed(2) + 'px');
  } else {
    shakeX = shakeY = 0;
    wrap.style.setProperty('--shake-x', '0px');
    wrap.style.setProperty('--shake-y', '0px');
  }
}

/* ----------------------------------------------------------------
   ENEMY SPAWNING
---------------------------------------------------------------- */
function getSpawnInterval() {
  const min   = CFG.SPAWN_MIN[gs.difficulty];
  const accel = CFG.SPAWN_ACCEL[gs.difficulty];
  return Math.max(min, CFG.SPAWN_BASE - gs.elapsed * accel);
}

function spawnEnemy(typeOverride=null) {
  const e = enemyPool.acquire();
  if (!e) return;

  const type = typeOverride || pickEnemyType(gs.dailyRule);
  const margin = type.size;

  const edge = Math.floor(Math.random() * 4);
  let sx, sy;
  if      (edge === 0) { sx = margin + Math.random()*(W-margin*2); sy = -margin; }
  else if (edge === 1) { sx = W+margin;  sy = margin + Math.random()*(H-margin*2); }
  else if (edge === 2) { sx = margin + Math.random()*(W-margin*2); sy = H+margin; }
  else                 { sx = -margin;   sy = margin + Math.random()*(H-margin*2); }

  const tx = W/2 + (Math.random()-0.5)*120;
  const ty = H/2 + (Math.random()-0.5)*180;
  const dist = Math.hypot(tx-sx, ty-sy);
  const speedMult = gs.difficulty === 'hard' ? 1.5 : gs.difficulty === 'normal' ? 1.2 : 1.0;
  const speed = type.baseSpeed * speedMult * (1 + gs.elapsed / 60000 * 0.5);

  e.x = sx; e.y = sy;
  e.vx = (tx-sx)/dist * speed;
  e.vy = (ty-sy)/dist * speed;
  e.hp = type.hpMax;
  e.hpMax = type.hpMax;
  e.type = type;
  e.size = type.size;
  e.angle = Math.random() * Math.PI * 2;
  e.spinSpeed = (Math.random()-0.5) * 0.06;
  e.spawnTime = gs.elapsed;
  e.flashTimer = 0;
  e.deathTimer = 0;
  e.dying = false;
}

/* ----------------------------------------------------------------
   HIT DETECTION
---------------------------------------------------------------- */
function hitTest(e, px, py, weapon) {
  const r = e.size * (weapon ? weapon.hitRadius * 0.55 : 0.55);
  const dist = Math.hypot(px - e.x, py - e.y);

  if (weapon && weapon.splashRadius > 0) {
    // Scythe: AOE around tap
    return Math.hypot(px - e.x, py - e.y) < weapon.splashRadius;
  }
  return dist < r;
}

/* ----------------------------------------------------------------
   v1.1.0: SHURIKEN PROJECTILE SYSTEM
---------------------------------------------------------------- */
function fireShuriken(px, py) {
  // Find nearest enemy in direction of tap
  let nearest = null;
  let nearestDist = Infinity;
  for (const e of enemyPool.list) {
    if (e.dying) continue;
    const d = Math.hypot(px - e.x, py - e.y);
    if (d < nearestDist) {
      nearestDist = d;
      nearest = e;
    }
  }

  if (!nearest) return;

  const dx = nearest.x - W/2;
  const dy = nearest.y - H/2;
  const d = Math.hypot(dx, dy) || 1;
  const speed = 18;

  gs.projectiles.push({
    x: W/2, y: H/2,
    vx: (dx/d) * speed,
    vy: (dy/d) * speed,
    pierceLeft: WEAPONS.shuriken.piercingCount,
    hit: new Set(),
    angle: 0,
  });
}

function updateProjectiles(dt) {
  gs.projectiles = gs.projectiles.filter(proj => {
    proj.x += proj.vx;
    proj.y += proj.vy;
    proj.angle += 0.3;

    // Check hits
    for (const e of [...enemyPool.list]) {
      if (e.dying || proj.hit.has(e)) continue;
      if (Math.hypot(proj.x - e.x, proj.y - e.y) < e.size * 0.55) {
        proj.hit.add(e);
        proj.pierceLeft--;
        const isCrit = Math.random() < (CFG.CRIT_CHANCE + gs.passiveCritBonus + WEAPONS.shuriken.critBonus);
        Audio.hit(gs.combo, 'shuriken');
        if (isCrit) Audio.crit();
        killEnemy(e, isCrit);
        haptic(isCrit ? CFG.HAPTIC_CRIT : CFG.HAPTIC_HIT);
        if (proj.pierceLeft <= 0) return false;
      }
    }

    // Out of bounds
    return !(proj.x < -20 || proj.x > W+20 || proj.y < -20 || proj.y > H+20);
  });
}

---------------------------------------------------------------- */
function getComboMultiplier(combo) {
  if (combo < 3)  return 1;
  if (combo < 6)  return 1.5;
  if (combo < 10) return 2;
  if (combo < 15) return 3;
  return 5;
}

function addCombo() {
  gs.combo++;
  // v1.1.0: passive combo bonus
  gs.comboTimer = CFG.COMBO_TIMEOUT + (gs.passiveComboBonus || 0);
  if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;

  if ([5, 10, 15, 20].includes(gs.combo)) {
    Audio.comboMilestone();
    haptic([20, 10, 20]);
  }

  // v1.1.0: combo BGM update
  ComboBGM.onComboChange(gs.combo);

  updateComboHUD();
}

function resetCombo() {
  if (gs.combo >= 3) {
    spawnFloatText(W/2, H*0.4, 'COMBO BREAK', '#ff4466', 14);
  }
  gs.combo = 0;
  gs.comboTimer = 0;
  ComboBGM.onComboReset();
  updateComboHUD();
}

   v1.1.0: STAGE SYSTEM
---------------------------------------------------------------- */
function checkStageProgression() {
  const thresholds = CFG.STAGE_THRESHOLDS;
  let newIdx = 0;
  for (let i = thresholds.length - 1; i >= 0; i--) {
    if (gs.score >= thresholds[i]) { newIdx = i; break; }
  }
  if (newIdx !== gs.currentStageIdx) {
    gs.currentStageIdx = newIdx;
    bgCache = null; // force background re-render
    showStageIndicator(STAGES[newIdx].name);
    Audio.stageTransition();
    triggerShake(12);
  }
}

  el.style.opacity = '1';
  stageIndicatorTimer = 2500;
}

/* ----------------------------------------------------------------
   v1.1.0: LEVELUP SYSTEM (passive skill selection)
---------------------------------------------------------------- */
function checkLevelup() {
  if (gs.nextLevelupIdx >= CFG.LEVELUP_THRESHOLDS.length) return;
  if (gs.score >= CFG.LEVELUP_THRESHOLDS[gs.nextLevelupIdx]) {
    gs.nextLevelupIdx++;
    triggerLevelup();
  }
}

function triggerLevelup() {
  // Pause the game
  const prevState = gameState;
  gameState = STATE.LEVELUP;

  // Pick 3 random skills (not already maxed)
  const available = PASSIVE_SKILLS.filter(s => {
    if (s.id === 'hp_up' && gs.hp >= CFG.MAX_HP + 1) return false;
    if (s.id === 'shield' && gs.shield) return false;
    return true;
  });

  // Shuffle and take 3
  const shuffled = available.sort(() => Math.random() - 0.5).slice(0, 3);

  const container = document.getElementById('skill-choices');
  container.innerHTML = '';
  shuffled.forEach(skill => {
    const btn = document.createElement('button');
    btn.className = 'skill-choice-btn';
    btn.innerHTML = `
      <div class="skill-choice-icon">${skill.icon}</div>
      <div class="skill-choice-body">
        <div class="skill-choice-name">${skill.name}</div>
        <div class="skill-choice-desc">${skill.desc}</div>
      </div>
    `;
    btn.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      Audio.skillSelect();
      skill.apply(gs);
      gs.appliedSkills.push(skill.id);
      document.getElementById('screen-levelup').classList.remove('active');
      gameState = STATE.PLAYING;
    });
    container.appendChild(btn);
  });

  document.getElementById('screen-levelup').classList.add('active');
  Audio.comboMilestone();
  haptic([30, 15, 30]);
}

/* ----------------------------------------------------------------
   SKILL: 瞬殺斬
---------------------------------------------------------------- */
function activateSkill() {
  if (gs.skillCooldown > 0) return;
  gs.skillCooldown = CFG.SKILL_COOLDOWN;
  gs.skillIsCharging = false;

  Audio.skill();
  emitSkillWave(W/2, H/2);
  triggerShake(14);
  haptic([40, 20, 40]);

  skillFlash.style.transition = 'opacity 0.05s';
  skillFlash.style.opacity = '0.7';
  setTimeout(()=>{ skillFlash.style.transition = 'opacity 0.3s'; skillFlash.style.opacity = '0'; }, 80);

  let killed = 0;
  for (const e of [...enemyPool.list]) {
    if (!e.dying) {
      if (e.type.isBoss) {
        e.hp = Math.max(0, e.hp - 2);
        if (e.hp <= 0) {
          killEnemy(e, true, true);
          killed++;
        } else {
          e.flashTimer = 300;
        }
      } else {
        killEnemy(e, true, true);
        killed++;
      }
    }
  }

  if (killed > 0) {
    spawnFloatText(W/2, H/2 - 40, `SKILL +${killed * 80}`, '#00e5ff', 22);
    gs.score += killed * 80;
    updateScoreHUD(true);
  }
}

/* ----------------------------------------------------------------
   KILL ENEMY
---------------------------------------------------------------- */
function killEnemy(e, isCrit=false, isSkill=false) {
  e.dying = true;
  e.deathTimer = 350;

  const weaponMult = gs.currentWeapon.damageMultiplier || 1;
  const scoreMult  = gs.currentWeapon.scoreMultiplier  || 1;
  const passiveMult = 1 + (gs.passiveScoreBonus || 0);

  const pts = Math.floor(
    e.type.scoreBase
    * getComboMultiplier(gs.combo)
    * CFG.DIFF_SCORE_MULT[gs.difficulty]
    * (isCrit ? 2 : 1)
    * weaponMult
    * passiveMult
  );

  gs.score += pts;
  gs.slayed++;
  if (isCrit) gs.crits++;

  emitSlash(e.x, e.y, isCrit ? 24 : 14, e.type.color, isCrit);
  if (!isSkill) emitBlood(e.x, e.y);

  const textColor = e.type.isBoss ? '#ff2244' : isCrit ? '#ffd700' : '#ffffff';
  const textSize  = e.type.isBoss ? 28 : isCrit ? 24 : 18;
  spawnFloatText(e.x, e.y - e.size/2, `+${pts.toLocaleString()}`, textColor, textSize);
  if (isCrit) spawnFloatText(e.x, e.y - e.size/2 - 28, 'CRITICAL!', '#ffd700', 16);

  // v1.1.0: Coin drop
  const dropRate = gs.passiveCoinBonus ? CFG.COIN_DROP_CHANCE + 0.3 : CFG.COIN_DROP_CHANCE;
  if (Math.random() < dropRate) {
    dropCoin(e.x, e.y, e.type.coinValue);
  }

  if (!isSkill) addCombo();
  updateScoreHUD(isCrit);

  // v1.1.0: Stage & levelup checks
  checkStageProgression();
  checkLevelup();

  if (e.type.isBoss) {
    gs.bossActive = false;
    triggerShake(18);
    haptic(CFG.HAPTIC_BOSS);
  } else {
    triggerShake(isCrit ? 10 : 6);
  }
}

/* ----------------------------------------------------------------
   TAKE DAMAGE
---------------------------------------------------------------- */
function takeDamage(e) {
  // v1.1.0: Shield passive
  if (gs.shield) {
    gs.shield = false;
    spawnFloatText(W/2, H*0.35, '🛡️ SHIELD', '#44ffaa', 18);
    triggerShake(8);
    return;
  }

  gs.hp = Math.max(0, gs.hp - 1);
  gs.deathCause = `${e.type.label}型に撃破された`;
  resetCombo();
  triggerShake(20);
  Audio.miss();
  haptic(CFG.HAPTIC_MISS);
  updateHpHUD();

  if (gs.hp <= 1 && !gs.slowActive) {
    gs.slowActive = true;
    gs.slowTimer = CFG.SLOW_DURATION + (gs.passiveSlowBonus || 0);
    slowOverlay.classList.add('active');
    Audio.slowTime();
    spawnFloatText(W/2, H*0.35, '時間停滞', '#aa44ff', 20);
  }

  // v1.1.0: No damage daily challenge ends on first hit
  if (gs.isDailyMode && gs.dailyRule && gs.dailyRule.noDamage) {
    gs.hp = 0;
    gs.deathCause = 'ノーダメージ挑戦失敗';
  }

  if (gs.hp <= 0) {
    triggerGameOver();
  }
}

/* ----------------------------------------------------------------
   GAME OVER / RESULT
---------------------------------------------------------------- */
function triggerGameOver() {
  gameState = STATE.RESULT;
  Audio.gameOver();
  ComboBGM.stop();
  slowOverlay.classList.remove('active');

  saveScore();

  if (gs.isDailyMode && gs.dailyRule) {
    Daily.saveRecord(gs.dailyRule, gs.score);
  }

  document.getElementById('res-score').textContent  = gs.score.toLocaleString();
  document.getElementById('res-combo').textContent  = gs.maxCombo;
  document.getElementById('res-slayed').textContent = gs.slayed;
  document.getElementById('res-crits').textContent  = gs.crits;
  document.getElementById('res-coins').textContent  = gs.coins;
  const sec = Math.floor(gs.elapsed/1000);
  document.getElementById('res-time').textContent   = `${Math.floor(sec/60)}:${String(sec%60).padStart(2,'0')}`;
  document.getElementById('res-diff').textContent   = gs.difficulty.toUpperCase() + (gs.isDailyMode ? ' 📅' : '');

  const rankBadge = getRankBadge(gs.score, gs.difficulty);
  document.getElementById('result-rank-badge').textContent = rankBadge;

  // v1.1.0: Death cause
  document.getElementById('result-death-cause').textContent =
    gs.deathCause ? `死因: ${gs.deathCause}` : '';

  // v1.1.0: "Almost!" delta
  const scores = loadScores();
  const best = scores.length > 0 ? scores[0].score : 0;
  const almost = document.getElementById('result-almost');
  if (best > 0 && gs.score < best) {
    const delta = best - gs.score;
    const pct = Math.round((gs.score / best) * 100);
    if (pct >= 80) {
      almost.textContent = `あと ${delta.toLocaleString()} でベスト更新！ (${pct}%)`;
    } else {
      almost.textContent = '';
    }
  } else {
    almost.textContent = '';
  }

  renderRankingList();

  // Attempt online submission (non-blocking, best-effort)
  OnlineRanking.submitScore('PLAYER', gs.score, gs.difficulty).catch(() => {});

  setTimeout(() => {
    document.getElementById('screen-result').classList.add('active');
    document.getElementById('hud').style.display = 'none';
    document.getElementById('daily-mode-bar').classList.remove('active');
  }, 400);
}

/* ----------------------------------------------------------------
   RANK BADGE
---------------------------------------------------------------- */
function getRankBadge(score, diff) {
  const thresholds = {
    easy:   [500, 1500, 4000, 8000],
    normal: [800, 2500, 6000, 12000],
    hard:   [1200, 3500, 9000, 20000],
  };
  const names = ['C RANK', 'B RANK', 'A RANK', 'S RANK', '★ SS RANK ★'];
  const t = thresholds[diff] || thresholds.normal;
  if (score >= t[3]) return names[4];
  if (score >= t[2]) return names[3];
  if (score >= t[1]) return names[2];
  if (score >= t[0]) return names[1];
  return names[0];
}

/* ----------------------------------------------------------------
   LOCAL STORAGE RANKING
---------------------------------------------------------------- */
const LS_KEY = 'ninjaSlave_v11_scores'; // v1.1.0: new key

function loadScores() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

function saveScore() {
  const scores = loadScores();
  scores.push({
    score: gs.score,
    diff: gs.difficulty,
    time: gs.elapsed,
    weapon: gs.currentWeapon.id,
    daily: gs.isDailyMode,
  });
  scores.sort((a,b) => b.score - a.score);
  scores.splice(5);
  try { localStorage.setItem(LS_KEY, JSON.stringify(scores)); } catch {}
  return scores;
}

function renderRankingList() {
  const scores = loadScores();
  const list   = document.getElementById('ranking-list');
  list.innerHTML = '';
  if (scores.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--c-dim);font-size:12px;padding:8px;">-- NO RECORD --</div>';
    return;
  }
  let isNewRecord = false;
  scores.forEach((s, i) => {
    const row = document.createElement('div');
    const isCurrent = (s.score === gs.score && s.diff === gs.difficulty && !isNewRecord);
    if (isCurrent) isNewRecord = true;
    row.className = 'ranking-row' + (isCurrent ? ' current-run' : '');
    const weaponIcon = s.weapon ? (WEAPONS[s.weapon]?.icon || '') : '';
    row.innerHTML = `
      <span class="rank-num">${i+1}.</span>
      <span class="rank-score">${s.score.toLocaleString()}</span>
      <span class="rank-diff">${weaponIcon} ${s.diff.toUpperCase()}${s.daily ? ' 📅' : ''}</span>
    `;
    list.appendChild(row);
  });

  if (isNewRecord && scores[0].score === gs.score) {
    const flash = document.createElement('div');
    flash.className = 'new-record-flash';
    flash.textContent = '★ NEW RECORD ★';
    document.getElementById('screen-result').appendChild(flash);
    setTimeout(() => flash.remove(), 2500);
  }
}

function renderTitleRanking() {
  const scores = loadScores();
  const el = document.getElementById('title-ranking-preview');
  if (scores.length === 0) {
    el.innerHTML = '<span>BEST SCORES</span>-- NO RECORD --';
    return;
  }
  let html = '<span>BEST SCORES</span>';
  scores.slice(0,3).forEach((s, i) => {
    const wIcon = s.weapon ? (WEAPONS[s.weapon]?.icon || '') : '';
    html += `${i+1}. ${s.score.toLocaleString()} ${wIcon}<small style="opacity:.5">${s.diff.toUpperCase()}</small>&nbsp;&nbsp;`;
  });
  el.innerHTML = html;
}

/* ----------------------------------------------------------------
   MAIN TAP HANDLER
---------------------------------------------------------------- */
document.getElementById('game-wrap').addEventListener('pointerdown', e => {
  if (gameState !== STATE.PLAYING) return;

  Audio.init();

  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top)  * scaleY;

  const weapon = gs.currentWeapon;

  // v1.1.0: Shuriken fires a projectile
  if (weapon.projectile) {
    fireShuriken(px, py);
    emitSlash(px, py, 4, '#aaddff');
    Audio.hit(gs.combo, 'shuriken');
    haptic(CFG.HAPTIC_HIT);
    return;
  }

  let hitAny = false;

  // Scythe: AOE — collect all enemies in splash radius
  if (weapon.splashRadius > 0) {
    let hitCount = 0;
    for (const en of [...enemyPool.list]) {
      if (en.dying) continue;
      if (!hitTest(en, px, py, weapon)) continue;
      const isCrit = Math.random() < Math.max(0, CFG.CRIT_CHANCE + gs.passiveCritBonus + weapon.critBonus);
      Audio.hit(gs.combo, 'scythe');
      if (isCrit) Audio.crit();
      if (en.type.isBoss) {
        en.hp--;
        en.flashTimer = 180;
        if (en.hp <= 0) killEnemy(en, isCrit);
        else { triggerShake(5); emitSlash(en.x, en.y, 8, en.type.color, isCrit); addCombo(); }
      } else {
        killEnemy(en, isCrit);
      }
      haptic(isCrit ? CFG.HAPTIC_CRIT : CFG.HAPTIC_HIT);
      hitCount++;
      hitAny = true;
    }
    if (hitCount > 1) spawnFloatText(px, py - 20, `×${hitCount} HIT!`, '#ff7722', 18);
    if (!hitAny) emitSlash(px, py, 4, '#664466');
    return;
  }

  // Sword: normal single-target
  const sorted = [...enemyPool.list].sort((a,b) => b.size - a.size);
  for (const en of sorted) {
    if (en.dying) continue;
    if (!hitTest(en, px, py, weapon)) continue;

    const isCrit = Math.random() < Math.max(0, CFG.CRIT_CHANCE + gs.passiveCritBonus + weapon.critBonus);
    Audio.hit(gs.combo, weapon.id);
    if (isCrit) Audio.crit();
    haptic(isCrit ? CFG.HAPTIC_CRIT : CFG.HAPTIC_HIT);

    if (en.type.isBoss) {
      en.hp--;
      en.flashTimer = 180;
      if (en.hp <= 0) {
        killEnemy(en, isCrit);
      } else {
        triggerShake(7);
        emitSlash(en.x, en.y, 10, en.type.color, isCrit);
        const pts = Math.floor(80 * CFG.DIFF_SCORE_MULT[gs.difficulty] * (isCrit?2:1));
        gs.score += pts;
        spawnFloatText(en.x, en.y - en.size/2, `+${pts}`, '#ff2244', 16);
        addCombo();
        updateScoreHUD(isCrit);
      }
    } else {
      killEnemy(en, isCrit);
    }

    hitAny = true;
    break;
  }

  if (!hitAny) {
    emitSlash(px, py, 4, '#444466');
  }
});

/* ----------------------------------------------------------------
   BACKGROUND RENDERING (stage-aware, cached per stage)
   v1.1.0: 3 stages with distinct visuals
   Note: bgCache / bgCacheStage declared near top (before resizeCanvas)
---------------------------------------------------------------- */
function renderBackground() {
  const stageIdx = (gameState === STATE.PLAYING || gameState === STATE.LEVELUP)
    ? gs.currentStageIdx : 0;
  const stage = STAGES[stageIdx] || STAGES[0];

  if (!bgCache || bgCache.width !== W || bgCache.height !== H || bgCacheStage !== stageIdx) {
    const oc = document.createElement('canvas');
    oc.width = W; oc.height = H;
    const ox = oc.getContext('2d');

    // Gradient base
    const grad = ox.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, Math.max(W,H)*0.8);
    grad.addColorStop(0, stage.bgGrad[0]);
    grad.addColorStop(1, stage.bgGrad[1]);
    ox.fillStyle = grad;
    ox.fillRect(0, 0, W, H);

    // Grid
    ox.strokeStyle = 'rgba(255,255,255,0.02)';
    ox.lineWidth = 1;
    const gridSize = 40;
    for (let x = 0; x < W; x += gridSize) {
      ox.beginPath(); ox.moveTo(x, 0); ox.lineTo(x, H); ox.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ox.beginPath(); ox.moveTo(0, y); ox.lineTo(W, y); ox.stroke();
    }

    // Stage-specific decorations
    if (stageIdx === 0) {
      // Night: subtle red circles
      ox.strokeStyle = 'rgba(255,34,68,0.04)';
      ox.lineWidth = 1;
      [0.3, 0.5, 0.7].forEach(r => {
        ox.beginPath();
        ox.arc(W/2, H/2, Math.min(W,H)*r, 0, Math.PI*2);
        ox.stroke();
      });
    } else if (stageIdx === 1) {
      // Storm: lightning crack lines
      ox.strokeStyle = 'rgba(0,150,255,0.08)';
      ox.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        const sx = Math.random() * W;
        ox.beginPath();
        ox.moveTo(sx, 0);
        let cx = sx;
        for (let y = 0; y < H; y += 40) {
          cx += (Math.random() - 0.5) * 60;
          ox.lineTo(cx, y);
        }
        ox.stroke();
      }
      // Rain overlay
      ox.fillStyle = 'rgba(0,80,160,0.04)';
      ox.fillRect(0, 0, W, H);
    } else if (stageIdx === 2) {
      // Inferno: fire glow at bottom, char pattern
      const fireGrad = ox.createLinearGradient(0, H*0.6, 0, H);
      fireGrad.addColorStop(0, 'transparent');
      fireGrad.addColorStop(1, 'rgba(255,80,0,0.12)');
      ox.fillStyle = fireGrad;
      ox.fillRect(0, 0, W, H);
      // Embers pattern
      ox.strokeStyle = 'rgba(255,120,0,0.06)';
      ox.lineWidth = 1;
      [0.3, 0.5, 0.7].forEach(r => {
        ox.beginPath();
        ox.arc(W/2, H/2, Math.min(W,H)*r, 0, Math.PI*2);
        ox.stroke();
      });
    }

    bgCache = oc;
    bgCacheStage = stageIdx;
  }
  ctx2d.drawImage(bgCache, 0, 0);
}

/* ----------------------------------------------------------------
   ENEMY RENDERING
---------------------------------------------------------------- */
function renderEnemy(e) {
  const alpha = e.dying ? Math.max(0, e.deathTimer / 350) : 1;
  if (alpha <= 0) return;

  ctx2d.save();
  ctx2d.globalAlpha = alpha;
  ctx2d.translate(e.x, e.y);
  ctx2d.rotate(e.angle);

  const r = e.size / 2;
  const col = e.type.color;
  const renderCol = (e.flashTimer > 0) ? '#ffffff' : col;

  if (e.type.isBoss) {
    const sides = 8;
    ctx2d.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = (i / sides) * Math.PI * 2 - Math.PI / 8;
      i === 0 ? ctx2d.moveTo(Math.cos(a)*r, Math.sin(a)*r)
              : ctx2d.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx2d.closePath();
    ctx2d.fillStyle = '#1a0010';
    ctx2d.fill();
    ctx2d.strokeStyle = renderCol;
    ctx2d.lineWidth = 3;
    ctx2d.stroke();

    ctx2d.shadowColor = renderCol;
    ctx2d.shadowBlur  = 20 + Math.sin(Date.now()*0.008)*8;
    ctx2d.strokeStyle = renderCol;
    ctx2d.lineWidth   = 1.5;
    ctx2d.stroke();
    ctx2d.shadowBlur  = 0;

    ctx2d.rotate(-e.angle);
    const barW = r * 1.6;
    const barH = 5;
    const barX = -barW/2;
    const barY = r + 6;
    ctx2d.fillStyle = '#331122';
    ctx2d.fillRect(barX, barY, barW, barH);
    ctx2d.fillStyle = renderCol;
    ctx2d.fillRect(barX, barY, barW * (e.hp / e.hpMax), barH);
    ctx2d.rotate(e.angle);
  } else {
    ctx2d.beginPath();
    ctx2d.moveTo(0, -r);
    ctx2d.lineTo(r*0.7, 0);
    ctx2d.lineTo(0, r);
    ctx2d.lineTo(-r*0.7, 0);
    ctx2d.closePath();
    ctx2d.fillStyle = 'rgba(10,10,20,0.9)';
    ctx2d.fill();
    ctx2d.strokeStyle = renderCol;
    ctx2d.lineWidth = 2;
    ctx2d.stroke();

    if (e.flashTimer <= 0) {
      ctx2d.beginPath();
      ctx2d.moveTo(0, -r*0.5);
      ctx2d.lineTo(r*0.35, 0);
      ctx2d.lineTo(0, r*0.5);
      ctx2d.lineTo(-r*0.35, 0);
      ctx2d.closePath();
      ctx2d.fillStyle = col + '33';
      ctx2d.fill();
    }

    if (e.hpMax > 1 && e.hp < e.hpMax) {
      ctx2d.rotate(-e.angle);
      ctx2d.fillStyle = '#ff4400';
      ctx2d.beginPath();
      ctx2d.arc(0, -r - 8, 4, 0, Math.PI*2);
      ctx2d.fill();
      ctx2d.rotate(e.angle);
    }
  }

  ctx2d.rotate(-e.angle);
  ctx2d.font = `bold ${Math.round(r * 0.75)}px 'Hiragino Mincho ProN', serif`;
  ctx2d.textAlign = 'center';
  ctx2d.textBaseline = 'middle';
  ctx2d.fillStyle = e.flashTimer > 0 ? '#000' : '#fff';
  ctx2d.globalAlpha = alpha;
  ctx2d.fillText(e.type.label, 0, 1);

  ctx2d.restore();
}

/* ----------------------------------------------------------------
   PARTICLE RENDERING
---------------------------------------------------------------- */
function renderParticle(p) {
  ctx2d.save();
  ctx2d.globalAlpha = p.alpha;
  ctx2d.translate(p.x, p.y);

  if (p.shape === 'slash') {
    ctx2d.rotate(p.rotation);
    ctx2d.strokeStyle = p.color;
    ctx2d.lineWidth = p.size * 0.5;
    ctx2d.lineCap = 'round';
    ctx2d.beginPath();
    ctx2d.moveTo(-p.size, 0);
    ctx2d.lineTo(p.size, 0);
    ctx2d.stroke();
  } else if (p.shape === 'star') {
    ctx2d.rotate(p.rotation);
    ctx2d.fillStyle = p.color;
    const s = p.size;
    ctx2d.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const b = a + Math.PI / 4;
      ctx2d.lineTo(Math.cos(a)*s, Math.sin(a)*s);
      ctx2d.lineTo(Math.cos(b)*s*0.4, Math.sin(b)*s*0.4);
    }
    ctx2d.closePath();
    ctx2d.fill();
  } else {
    ctx2d.fillStyle = p.color;
    ctx2d.beginPath();
    ctx2d.arc(0, 0, p.size, 0, Math.PI * 2);
    ctx2d.fill();
  }

  ctx2d.restore();
}

/* ----------------------------------------------------------------
   v1.1.0: COIN RENDERING
---------------------------------------------------------------- */
function renderCoin(c) {
  ctx2d.save();
  ctx2d.globalAlpha = c.alpha * (c.life < 10 ? c.life/10 : c.life > c.maxLife*0.7 ? 1-(c.life-c.maxLife*0.7)/(c.maxLife*0.3) : 1);
  ctx2d.translate(c.x, c.y);

  // Outer ring
  ctx2d.beginPath();
  ctx2d.arc(0, 0, c.size, 0, Math.PI*2);
  ctx2d.fillStyle = '#ffd700';
  ctx2d.fill();

  // Inner shine
  ctx2d.beginPath();
  ctx2d.arc(-c.size*0.2, -c.size*0.2, c.size*0.5, 0, Math.PI*2);
  ctx2d.fillStyle = 'rgba(255,255,255,0.4)';
  ctx2d.fill();

  // Value label
  if (c.value >= 10) {
    ctx2d.font = `bold ${Math.round(c.size * 1.2)}px monospace`;
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.fillStyle = '#664400';
    ctx2d.fillText(c.value, 0, 1);
  }

  ctx2d.restore();
}

/* ----------------------------------------------------------------
   v1.1.0: SHURIKEN PROJECTILE RENDERING
---------------------------------------------------------------- */
function renderProjectile(proj) {
  ctx2d.save();
  ctx2d.translate(proj.x, proj.y);
  ctx2d.rotate(proj.angle);
  ctx2d.globalAlpha = 0.9;

  // 4-pointed star
  ctx2d.fillStyle = '#aaddff';
  ctx2d.strokeStyle = '#ffffff';
  ctx2d.lineWidth = 1;
  const s = 10;
  ctx2d.beginPath();
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    const b = a + Math.PI / 4;
    ctx2d.lineTo(Math.cos(a)*s, Math.sin(a)*s);
    ctx2d.lineTo(Math.cos(b)*s*0.35, Math.sin(b)*s*0.35);
  }
  ctx2d.closePath();
  ctx2d.fill();
  ctx2d.stroke();

  // Glow trail
  ctx2d.shadowColor = '#00aaff';
  ctx2d.shadowBlur = 12;
  ctx2d.fill();

  ctx2d.restore();
}

/* ----------------------------------------------------------------
   MAIN UPDATE LOOP
---------------------------------------------------------------- */
let lastTime = 0;
let titleAnimFrame = 0;
let ambientTimer = 0;

function update(dt) {
  const effectiveDt = dt * gs.timeScale;

  // Time scale update (slow-time)
  if (gs.slowActive) {
    gs.slowTimer -= dt;
    gs.timeScale = CFG.SLOW_FACTOR;
    if (gs.slowTimer <= 0) {
      gs.slowActive = false;
      gs.timeScale = 1;
      slowOverlay.classList.remove('active');
    }
  } else {
    gs.timeScale = 1;
  }

  gs.elapsed += effectiveDt;

  // v1.1.0: Daily time limit check
  if (gs.timeLimit && gs.elapsed >= gs.timeLimit) {
    gs.deathCause = 'タイムアップ';
    gs.hp = 0;
    triggerGameOver();
    return;
  }

  // Combo timer
  if (gs.combo > 0) {
    gs.comboTimer -= effectiveDt;
    if (gs.comboTimer <= 0) resetCombo();
  }

  // Skill cooldown
  if (gs.skillCooldown > 0) {
    gs.skillCooldown = Math.max(0, gs.skillCooldown - dt);
  }

  // Boss warning timer
  if (bossWarnTimer > 0) {
    bossWarnTimer -= dt;
    if (bossWarnTimer <= 0) bossWarning.style.opacity = '0';
  }

  // Stage indicator timer
  if (stageIndicatorTimer > 0) {
    stageIndicatorTimer -= dt;
    if (stageIndicatorTimer <= 0) {
      document.getElementById('stage-indicator').style.opacity = '0';
    }
  }

  // Enemy spawn
  gs.spawnTimer -= effectiveDt;
  if (gs.spawnTimer <= 0) {
    spawnEnemy();
    gs.spawnTimer = getSpawnInterval();
    if (gs.difficulty === 'hard' && gs.elapsed > 30000 && Math.random() < 0.3) {
      spawnEnemy();
    }
  }

  // Boss spawn
  if (!gs.bossActive) {
    gs.bossTimer += effectiveDt;
    if (gs.bossTimer >= CFG.BOSS_INTERVAL) {
      gs.bossTimer = 0;
      gs.bossActive = true;
      spawnEnemy(BOSS_TYPE);
      showBossWarning();
      Audio.bossAppear();
      triggerShake(10);
    }
  }

  // Update enemies
  for (const e of [...enemyPool.list]) {
    if (e.dying) {
      e.deathTimer -= dt;
      if (e.deathTimer <= 0) enemyPool.release(e);
      continue;
    }

    e.x += e.vx * effectiveDt / 16;
    e.y += e.vy * effectiveDt / 16;
    e.angle += e.spinSpeed * effectiveDt / 16;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    const dist = Math.hypot(e.x - W/2, e.y - H/2);
    const hitZone = e.size * 0.5 + 30;
    if (dist < hitZone && gs.elapsed - e.spawnTime > CFG.MISS_GRACE) {
      enemyPool.release(e);
      takeDamage(e);
      return;
    }

    if (e.x < -200 || e.x > W+200 || e.y < -200 || e.y > H+200) {
      enemyPool.release(e);
    }
  }

  // Update particles
  for (const p of [...particlePool.list]) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.vx *= 0.96;
    p.alpha -= p.decay;
    p.rotation += p.rotSpeed;
    if (p.alpha <= 0) particlePool.release(p);
  }

  // Update float texts
  for (const t of [...textPool.list]) {
    t.y += t.vy;
    t.life++;
    if (t.life > t.maxLife * 0.6) {
      t.alpha = 1 - (t.life - t.maxLife * 0.6) / (t.maxLife * 0.4);
    }
    if (t.life >= t.maxLife) textPool.release(t);
  }

  // v1.1.0: Update coins
  updateCoins(dt);

  // v1.1.0: Update shuriken projectiles
  if (gs.currentWeapon.projectile) {
    updateProjectiles(dt);
  }

  // v1.1.0: Ambient particles for storm/inferno stages
  if (gs.currentStageIdx > 0) {
    ambientTimer -= dt;
    if (ambientTimer <= 0) {
      emitAmbient(gs.currentStageIdx);
      ambientTimer = gs.currentStageIdx === 1 ? 40 : 80; // storm = more rain
    }
  }

  updateTimerHUD();
  updateSkillHUD(dt);
  updateShake();
}

/* ----------------------------------------------------------------
   RENDER LOOP
---------------------------------------------------------------- */
function render() {
  ctx2d.clearRect(0, 0, W, H);
  renderBackground();

  if (gameState !== STATE.PLAYING && gameState !== STATE.LEVELUP) return;

  // Player indicator
  const pCenterAlpha = 0.35 + Math.sin(Date.now()*0.004)*0.12;
  ctx2d.save();
  ctx2d.globalAlpha = pCenterAlpha;
  ctx2d.strokeStyle = gs.currentWeapon.id === 'scythe' ? '#ff8844'
                    : gs.currentWeapon.id === 'shuriken' ? '#00aaff' : '#ffffff';
  ctx2d.lineWidth = gs.currentWeapon.id === 'scythe' ? 2 : 1;
  ctx2d.setLineDash([4,6]);
  ctx2d.beginPath();
  ctx2d.arc(W/2, H/2, gs.currentWeapon.splashRadius > 0 ? gs.currentWeapon.splashRadius * 0.3 : 28, 0, Math.PI*2);
  ctx2d.stroke();
  ctx2d.setLineDash([]);
  ctx2d.restore();

  // Particles (behind enemies)
  for (const p of particlePool.list) renderParticle(p);

  // Coins
  for (const c of coinPool.list) renderCoin(c);

  // Enemies
  for (const e of enemyPool.list) renderEnemy(e);

  // Shuriken projectiles
  if (gs.projectiles) {
    for (const proj of gs.projectiles) renderProjectile(proj);
  }

  // Float texts
  for (const t of textPool.list) {
    ctx2d.save();
    ctx2d.globalAlpha = t.alpha;
    ctx2d.font = `bold ${t.size}px 'Hiragino Mincho ProN', serif`;
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    ctx2d.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx2d.lineWidth = 3;
    ctx2d.strokeText(t.text, t.x, t.y);
    ctx2d.fillStyle = t.color;
    ctx2d.fillText(t.text, t.x, t.y);
    ctx2d.restore();
  }

  // Combo bar
  if (gs.combo >= 2 && gs.comboTimer > 0) {
    const barW = W * 0.5;
    const barX = (W - barW) / 2;
    const barY = H - 110;
    const timeout = CFG.COMBO_TIMEOUT + (gs.passiveComboBonus || 0);
    const progress = gs.comboTimer / timeout;
    ctx2d.save();
    ctx2d.globalAlpha = 0.6;
    ctx2d.fillStyle = '#222';
    ctx2d.fillRect(barX, barY, barW, 3);
    ctx2d.fillStyle = progress > 0.4 ? '#ff7722' : '#ff2244';
    ctx2d.fillRect(barX, barY, barW * progress, 3);
    ctx2d.restore();
  }

  // Multiplier badge
  const mult = getComboMultiplier(gs.combo);
  if (mult > 1) {
    ctx2d.save();
    ctx2d.globalAlpha = 0.9;
    ctx2d.font = 'bold 14px "SF Mono", monospace';
    ctx2d.textAlign = 'right';
    ctx2d.fillStyle = '#ff7722';
    ctx2d.fillText(`×${mult}`, W - 28, H - 90);
    ctx2d.restore();
  }

  // v1.1.0: Scythe range indicator on tap (show AOE circle briefly)
  // rendered via enemy hit test visual — handled in hit flash
}

/* ----------------------------------------------------------------
   TITLE SCREEN ANIMATION
---------------------------------------------------------------- */
function renderTitleBg() {
  ctx2d.clearRect(0, 0, W, H);
  renderBackground();

  titleAnimFrame++;
  const chars = ['忍','殺','斬','武','刀','鬼','刃','影'];
  ctx2d.font = 'bold 24px serif';
  ctx2d.textAlign = 'center';

  for (let i = 0; i < 8; i++) {
    const seed = i * 1.37;
    const x = ((Math.sin(seed * 3.1 + titleAnimFrame * 0.003) + 1)/2) * W;
    const y = ((H * 0.15 * i / 8) + titleAnimFrame * 0.15 * (0.5 + (i%3)*0.3)) % H;
    const alpha = 0.04 + Math.sin(seed + titleAnimFrame * 0.01) * 0.02;
    ctx2d.save();
    ctx2d.globalAlpha = Math.max(0.01, alpha);
    ctx2d.fillStyle = '#ff2244';
    ctx2d.fillText(chars[i % chars.length], x, y);
    ctx2d.restore();
  }
}

/* ----------------------------------------------------------------
   MAIN RAF LOOP
---------------------------------------------------------------- */
function loop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50);
  lastTime = timestamp;

  if (gameState === STATE.PLAYING) {
    update(dt);
    render();
  } else if (gameState === STATE.LEVELUP) {
    // Still render game in background (paused)
    render();
  } else if (gameState === STATE.TITLE) {
    renderTitleBg();
  } else if (gameState === STATE.RESULT) {
    renderBackground();
  }

  requestAnimationFrame(loop);
}

/* ----------------------------------------------------------------
   INIT
---------------------------------------------------------------- */
function init() {
  initDailyUI();
  renderTitleRanking();
  document.getElementById('screen-title').classList.add('active');
  document.getElementById('hud').style.display = 'none';
  requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
}

init();
</script>
