<!DOCTYPE html>
<html lang="ja">
<head>
<!--
  NINJA SLASH - 忍斬
  v1.0.0
  Genre: Roguelike Action
  Author: Claude (Anthropic)
  Architecture: State Machine + Object Pool + Web Audio API
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>忍斬 NINJA SLASH</title>
<style>
  /* ============================================================
     RESET & ROOT
  ============================================================ */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-bg:       #0a0a0f;
    --c-panel:    #12121a;
    --c-border:   #2a2a3a;
    --c-ink:      #ffffff;
    --c-dim:      rgba(255,255,255,0.45);
    --c-red:      #ff2244;
    --c-orange:   #ff7722;
    --c-gold:     #ffd700;
    --c-cyan:     #00e5ff;
    --c-purple:   #aa44ff;
    --c-green:    #44ff88;
    --c-hp1:      #ff2244;
    --c-hp2:      #ff7722;
    --c-hp3:      #44ff88;
    --font-ja:    'Hiragino Mincho ProN', 'Yu Mincho', 'MS Mincho', serif;
    --font-mono:  'SF Mono', 'Fira Code', 'Courier New', monospace;
    --shake-x:    0px;
    --shake-y:    0px;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--c-bg);
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-ja);
  }

  /* ============================================================
     CANVAS WRAPPER — shake animation anchor
  ============================================================ */
  #game-wrap {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 480px;
    overflow: hidden;
    transform: translate(var(--shake-x), var(--shake-y));
    will-change: transform;
  }

  #game-canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: none;
  }

  /* ============================================================
     SCREENS
  ============================================================ */
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    z-index: 10;
  }
  .screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ============================================================
     TITLE SCREEN
  ============================================================ */
  #screen-title {
    background: radial-gradient(ellipse at 50% 30%, #1a0a0f 0%, #0a0a0f 70%);
  }

  .title-deco {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .title-deco::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(255,34,68,0.08) 0%, transparent 70%);
    animation: pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%,100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
    50%      { opacity: 1;   transform: translateX(-50%) scale(1.15); }
  }

  .title-mon {
    font-size: clamp(60px, 18vw, 96px);
    letter-spacing: 0.15em;
    color: var(--c-ink);
    text-shadow:
      0 0 20px rgba(255,34,68,0.8),
      0 0 60px rgba(255,34,68,0.4),
      0 2px 0 rgba(255,34,68,0.9);
    animation: title-flicker 4s ease-in-out infinite;
    position: relative;
    z-index: 1;
    line-height: 1;
  }
  @keyframes title-flicker {
    0%,96%,100% { opacity: 1; }
    97%          { opacity: 0.7; }
    98%          { opacity: 1; }
    99%          { opacity: 0.5; }
  }

  .title-sub {
    font-family: var(--font-mono);
    font-size: clamp(11px, 3vw, 14px);
    letter-spacing: 0.5em;
    color: var(--c-dim);
    text-transform: uppercase;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  .title-divider {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--c-red), transparent);
    margin: 28px 0 24px;
  }

  /* Difficulty selector */
  .diff-label {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--c-dim);
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .diff-row {
    display: flex;
    gap: 10px;
    margin-bottom: 32px;
  }

  .diff-btn {
    padding: 8px 20px;
    border: 1px solid var(--c-border);
    background: transparent;
    color: var(--c-dim);
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .diff-btn.selected,
  .diff-btn:hover {
    background: var(--c-red);
    border-color: var(--c-red);
    color: #fff;
    box-shadow: 0 0 15px rgba(255,34,68,0.5);
  }

  .start-btn {
    padding: 16px 52px;
    background: var(--c-red);
    color: #fff;
    font-family: var(--font-ja);
    font-size: clamp(18px, 5vw, 22px);
    letter-spacing: 0.3em;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 0 25px rgba(255,34,68,0.6), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: all 0.12s;
    -webkit-tap-highlight-color: transparent;
    animation: btn-breathe 2s ease-in-out infinite;
  }
  @keyframes btn-breathe {
    0%,100% { box-shadow: 0 0 25px rgba(255,34,68,0.6), inset 0 1px 0 rgba(255,255,255,0.15); }
    50%      { box-shadow: 0 0 45px rgba(255,34,68,0.9), inset 0 1px 0 rgba(255,255,255,0.15); }
  }
  .start-btn:active { transform: scale(0.96); }

  .title-ranking-preview {
    margin-top: 28px;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--c-dim);
    letter-spacing: 0.1em;
    min-height: 50px;
  }
  .title-ranking-preview span {
    display: block;
    color: var(--c-gold);
    font-size: 13px;
    margin-bottom: 4px;
    letter-spacing: 0.3em;
  }

  /* ============================================================
     HUD (in-game overlay)
  ============================================================ */
  #hud {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 20px 0;
  }

  .hud-score-wrap {
    display: flex;
    flex-direction: column;
  }
  .hud-score-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.35em;
    color: var(--c-dim);
    text-transform: uppercase;
  }
  .hud-score {
    font-family: var(--font-mono);
    font-size: clamp(22px, 6vw, 30px);
    color: var(--c-ink);
    letter-spacing: 0.05em;
    line-height: 1.1;
    text-shadow: 0 0 15px rgba(255,255,255,0.3);
    transition: color 0.1s;
  }
  .hud-score.crit { color: var(--c-gold); text-shadow: 0 0 20px rgba(255,215,0,0.8); }

  .hud-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  /* HP display */
  .hud-hp-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .hp-gem {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--c-hp3);
    box-shadow: 0 0 8px var(--c-hp3);
    transition: all 0.2s;
  }
  .hp-gem.empty {
    background: transparent;
    border: 1px solid var(--c-border);
    box-shadow: none;
  }

  /* Timer */
  .hud-timer {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--c-dim);
  }
  .hud-timer.warning { color: var(--c-red); animation: blink 0.5s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Combo display */
  .hud-combo-wrap {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .hud-combo-num {
    font-family: var(--font-mono);
    font-size: clamp(48px, 14vw, 72px);
    font-weight: 900;
    color: var(--c-orange);
    line-height: 1;
    text-shadow:
      0 0 20px rgba(255,119,34,0.9),
      0 0 50px rgba(255,119,34,0.5);
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.1s, transform 0.15s cubic-bezier(0.2,1.5,0.5,1);
  }
  .hud-combo-num.show {
    opacity: 1;
    transform: scale(1);
  }
  .hud-combo-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--c-orange);
    opacity: 0.7;
  }

  /* Skill button */
  .hud-skill-btn {
    position: absolute;
    bottom: 28px;
    right: 24px;
    width: 64px; height: 64px;
    border-radius: 50%;
    border: 2px solid var(--c-border);
    background: rgba(10,10,15,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    pointer-events: auto;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.1s;
    overflow: hidden;
  }
  .hud-skill-btn::before {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 0%;
    background: rgba(0,229,255,0.25);
    transition: height linear;
  }
  .hud-skill-btn.charging::before { height: 100%; }
  .hud-skill-btn.ready { border-color: var(--c-cyan); box-shadow: 0 0 15px rgba(0,229,255,0.5); }
  .hud-skill-btn.cooldown { opacity: 0.4; }
  .skill-icon { font-size: 22px; line-height: 1; }
  .skill-label {
    font-family: var(--font-mono);
    font-size: 8px;
    letter-spacing: 0.1em;
    color: var(--c-dim);
    margin-top: 1px;
  }
  .skill-cd-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--c-cyan);
    position: absolute;
  }

  /* Slow-time overlay */
  #slow-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(100,50,255,0.12) 100%);
    border: 2px solid rgba(100,50,255,0.3);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 4;
  }
  #slow-overlay.active { opacity: 1; }

  /* Skill flash overlay */
  #skill-flash {
    position: absolute;
    inset: 0;
    background: rgba(0,229,255,0.15);
    pointer-events: none;
    opacity: 0;
    z-index: 6;
  }

  /* Boss warning */
  #boss-warning {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-ja);
    font-size: clamp(24px, 7vw, 36px);
    color: var(--c-red);
    letter-spacing: 0.3em;
    text-shadow: 0 0 20px rgba(255,34,68,0.9);
    opacity: 0;
    pointer-events: none;
    z-index: 8;
    white-space: nowrap;
  }

  /* ============================================================
     RESULT SCREEN
  ============================================================ */
  #screen-result {
    background: rgba(10,10,15,0.96);
  }

  .result-title {
    font-size: clamp(28px, 8vw, 40px);
    letter-spacing: 0.3em;
    color: var(--c-ink);
    text-shadow: 0 0 20px rgba(255,34,68,0.6);
    margin-bottom: 6px;
  }
  .result-rank-badge {
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 0.4em;
    color: var(--c-gold);
    text-transform: uppercase;
    margin-bottom: 24px;
    min-height: 18px;
  }

  .result-stats {
    width: 260px;
    border: 1px solid var(--c-border);
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 20px;
  }
  .result-stat-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--c-border);
    font-family: var(--font-mono);
    font-size: 13px;
  }
  .result-stat-row:last-child { border-bottom: none; }
  .result-stat-row span:first-child { color: var(--c-dim); letter-spacing: 0.1em; }
  .result-stat-row span:last-child  { color: var(--c-ink); }
  .result-stat-row.highlight span:last-child { color: var(--c-gold); }

  .result-ranking {
    width: 260px;
    margin-bottom: 24px;
  }
  .ranking-header {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--c-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    text-align: center;
  }
  .ranking-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 10px;
    font-family: var(--font-mono);
    font-size: 12px;
    border-radius: 2px;
    transition: background 0.1s;
  }
  .ranking-row.current-run {
    background: rgba(255,215,0,0.1);
    border: 1px solid rgba(255,215,0,0.3);
  }
  .rank-num  { color: var(--c-dim); width: 24px; }
  .rank-score{ color: var(--c-ink); }
  .rank-diff { color: var(--c-dim); font-size: 10px; }

  .result-btns {
    display: flex;
    gap: 12px;
  }
  .retry-btn {
    padding: 14px 36px;
    background: var(--c-red);
    color: #fff;
    font-family: var(--font-ja);
    font-size: 18px;
    letter-spacing: 0.3em;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    box-shadow: 0 0 20px rgba(255,34,68,0.5);
    -webkit-tap-highlight-color: transparent;
    transition: all 0.1s;
  }
  .retry-btn:active { transform: scale(0.95); }
  .title-back-btn {
    padding: 14px 20px;
    background: transparent;
    color: var(--c-dim);
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    border: 1px solid var(--c-border);
    cursor: pointer;
    border-radius: 2px;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.1s;
  }
  .title-back-btn:active { opacity: 0.6; }

  /* ============================================================
     MISC
  ============================================================ */
  .new-record-flash {
    position: absolute;
    top: 15%;
    left: 50%;
    transform: translateX(-50%);
    font-family: var(--font-ja);
    font-size: clamp(20px, 6vw, 28px);
    color: var(--c-gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.9);
    letter-spacing: 0.3em;
    opacity: 0;
    animation: record-pop 2s ease forwards;
    pointer-events: none;
    white-space: nowrap;
  }
  @keyframes record-pop {
    0%   { opacity: 0; transform: translateX(-50%) scale(0.5); }
    20%  { opacity: 1; transform: translateX(-50%) scale(1.1); }
    40%  { transform: translateX(-50%) scale(1); }
    70%  { opacity: 1; }
    100% { opacity: 0; transform: translateX(-50%) scale(1); }
  }

  /* Scanline effect */
  #scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.04) 2px,
      rgba(0,0,0,0.04) 4px
    );
    pointer-events: none;
    z-index: 20;
  }
</style>
</head>
<body>
<div id="game-wrap">

  <!-- Canvas (main game rendering) -->
  <canvas id="game-canvas"></canvas>

  <!-- Slow-time vignette -->
  <div id="slow-overlay"></div>
  <!-- Skill flash -->
  <div id="skill-flash"></div>
  <!-- Scanlines -->
  <div id="scanlines"></div>

  <!-- Boss warning -->
  <div id="boss-warning">⚠ 頭領接近 ⚠</div>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-top">
      <div class="hud-score-wrap">
        <div class="hud-score-label">SCORE</div>
        <div class="hud-score" id="hud-score">0</div>
      </div>
      <div class="hud-right">
        <div class="hud-hp-row" id="hud-hp"></div>
        <div class="hud-timer" id="hud-timer">00:00</div>
      </div>
    </div>

    <div class="hud-combo-wrap" id="hud-combo-wrap">
      <div class="hud-combo-num" id="hud-combo-num">0</div>
      <div class="hud-combo-label">COMBO</div>
    </div>

    <!-- Skill button -->
    <div class="hud-skill-btn" id="skill-btn">
      <div class="skill-icon">⚡</div>
      <div class="skill-label">SKILL</div>
      <div class="skill-cd-text" id="skill-cd-text"></div>
    </div>
  </div>

  <!-- TITLE SCREEN -->
  <div class="screen" id="screen-title">
    <div class="title-deco"></div>
    <div class="title-mon">忍斬</div>
    <div class="title-sub">NINJA SLASH</div>
    <div class="title-divider"></div>
    <div class="diff-label">DIFFICULTY</div>
    <div class="diff-row">
      <button class="diff-btn" data-diff="easy">易</button>
      <button class="diff-btn selected" data-diff="normal">普</button>
      <button class="diff-btn" data-diff="hard">難</button>
    </div>
    <button class="start-btn" id="start-btn">開始</button>
    <div class="title-ranking-preview" id="title-ranking-preview"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div class="screen" id="screen-result">
    <div class="result-title">試合終了</div>
    <div class="result-rank-badge" id="result-rank-badge"></div>
    <div class="result-stats">
      <div class="result-stat-row highlight">
        <span>SCORE</span><span id="res-score">0</span>
      </div>
      <div class="result-stat-row">
        <span>MAX COMBO</span><span id="res-combo">0</span>
      </div>
      <div class="result-stat-row">
        <span>SLAYED</span><span id="res-slayed">0</span>
      </div>
      <div class="result-stat-row">
        <span>CRITS</span><span id="res-crits">0</span>
      </div>
      <div class="result-stat-row">
        <span>TIME</span><span id="res-time">0:00</span>
      </div>
      <div class="result-stat-row">
        <span>DIFFICULTY</span><span id="res-diff">NORMAL</span>
      </div>
    </div>
    <div class="result-ranking">
      <div class="ranking-header">◆ BEST SCORES ◆</div>
      <div id="ranking-list"></div>
    </div>
    <div class="result-btns">
      <button class="retry-btn" id="retry-btn">再戦</button>
      <button class="title-back-btn" id="title-back-btn">TITLE</button>
    </div>
  </div>

</div><!-- /game-wrap -->

<script>
/* ================================================================
   NINJA SLASH v1.0.0
   Main game script
================================================================ */
'use strict';

/* ----------------------------------------------------------------
   CONSTANTS & CONFIG
---------------------------------------------------------------- */
const CFG = {
  MAX_HP: 3,
  COMBO_TIMEOUT: 2200,      // ms to reset combo
  SPAWN_BASE: 2000,         // ms between spawns at t=0
  SPAWN_MIN: { easy:700, normal:450, hard:280 },
  SPAWN_ACCEL: { easy:0.6, normal:0.9, hard:1.4 }, // ms/s reduction
  DIFF_SCORE_MULT: { easy:1, normal:1.5, hard:2.5 },
  SKILL_CHARGE_TIME: 900,   // ms hold to activate
  SKILL_COOLDOWN: 8000,
  SLOW_DURATION: 3000,
  SLOW_FACTOR: 0.28,
  BOSS_INTERVAL: 30000,     // ms between boss spawns
  CRIT_CHANCE: 0.15,
  PARTICLE_POOL_SIZE: 140,
  ENEMY_POOL_SIZE: 22,
  TEXT_POOL_SIZE: 30,
  MISS_GRACE: 180,          // ms after spawn before miss-tap registered
};

/* ----------------------------------------------------------------
   STATE MACHINE
---------------------------------------------------------------- */
const STATE = { TITLE: 0, PLAYING: 1, RESULT: 2 };
let gameState = STATE.TITLE;

/* ----------------------------------------------------------------
   AUDIO ENGINE
---------------------------------------------------------------- */
const Audio = (() => {
  let ctx = null;
  const init = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
  };

  const masterGain = () => {
    const g = ctx.createGain();
    g.gain.value = 0.55;
    g.connect(ctx.destination);
    return g;
  };

  // Generic tone oscillator
  const tone = (freq, type, duration, vol=0.4, decay=0.9) => {
    if (!ctx) return;
    const osc  = ctx.createOscillator();
    const gain = ctx.createGain();
    const t = ctx.currentTime;
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(t);
    osc.stop(t + duration);
  };

  // Noise burst (for hit crunch)
  const noise = (duration, vol=0.3) => {
    if (!ctx) return;
    const buf  = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src  = ctx.createBufferSource();
    const gain = ctx.createGain();
    const filt = ctx.createBiquadFilter();
    src.buffer = buf;
    filt.type  = 'bandpass';
    filt.frequency.value = 800;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    src.connect(filt);
    filt.connect(gain);
    gain.connect(ctx.destination);
    src.start();
  };

  return {
    init,
    // Hit — pitch rises with combo
    hit(combo=1) {
      const base = 380 + Math.min(combo, 12) * 45;
      tone(base, 'square', 0.08, 0.28);
      noise(0.06, 0.18);
      tone(base * 2, 'sine', 0.05, 0.12);
    },
    // Critical hit — bright metallic
    crit() {
      tone(900, 'sawtooth', 0.06, 0.4);
      tone(1350, 'sine', 0.1, 0.25);
      noise(0.08, 0.25);
    },
    // Miss (enemy reaches player)
    miss() {
      tone(120, 'sawtooth', 0.3, 0.5);
      tone(80, 'sine', 0.35, 0.35);
    },
    // Boss appear
    bossAppear() {
      tone(220, 'sawtooth', 0.15, 0.5);
      tone(165, 'square', 0.3, 0.4);
      tone(110, 'sawtooth', 0.5, 0.35);
    },
    // Skill activate
    skill() {
      tone(660, 'sine', 0.08, 0.4);
      tone(880, 'sine', 0.12, 0.3);
      tone(1100, 'sine', 0.18, 0.2);
      noise(0.2, 0.15);
    },
    // Combo milestone
    comboMilestone() {
      tone(440, 'triangle', 0.08, 0.3);
      tone(550, 'triangle', 0.12, 0.25);
      tone(660, 'triangle', 0.16, 0.2);
    },
    // Game over
    gameOver() {
      tone(220, 'sawtooth', 0.5, 0.5);
      tone(165, 'sine', 0.8, 0.4);
      tone(110, 'sawtooth', 1.0, 0.3);
    },
    // Time slow activate
    slowTime() {

      tone(220, 'sine', 0.6, 0.2);
    },
    // UI tap
    uiTap() {
      tone(660, 'sine', 0.05, 0.15);
    },
  };
})();

/* ----------------------------------------------------------------
   OBJECT POOL FACTORY
---------------------------------------------------------------- */
function createPool(size, factory) {
  const pool = Array.from({ length: size }, factory);
  const active = [];

  return {
    acquire() {
      for (let i = 0; i < pool.length; i++) {
        if (!pool[i].active) {
          pool[i].active = true;
          active.push(pool[i]);
          return pool[i];
        }
      }
      return null; // pool exhausted
    },
    release(obj) {
      obj.active = false;
      const idx = active.indexOf(obj);
      if (idx !== -1) active.splice(idx, 1);
    },
    releaseAll() {
      for (const o of active) o.active = false;
      active.length = 0;
    },
    get list() { return active; },
  };
}

/* ----------------------------------------------------------------
   ENEMY TYPES
---------------------------------------------------------------- */

  // id, label, hpMax, baseSpeed, size, scoreBase, color, weight (spawn probability)
  { id:'normal',  label:'忍',  hpMax:1, baseSpeed:2.0, size:52, scoreBase:100, color:'#e0e0e0', weight:40 },
  { id:'fast',    label:'迅',  hpMax:1, baseSpeed:3.5, size:42, scoreBase:150, color:'#44aaff', weight:25 },
  { id:'heavy',   label:'豪',  hpMax:2, baseSpeed:1.3, size:68, scoreBase:220, color:'#ff8844', weight:20 },
  { id:'swarm',   label:'群',  hpMax:1, baseSpeed:4.2, size:34, scoreBase:80,  color:'#88ff44', weight:15 },
];

const BOSS_TYPE = {
  id:'boss', label:'頭', hpMax:5, baseSpeed:0.9, size:88, scoreBase:1200, color:'#ff2244', isBoss:true,
};

// Weighted random enemy type selector
const ENEMY_TOTAL_WEIGHT = ENEMY_TYPES.reduce((s,e)=>s+e.weight, 0);
function pickEnemyType() {
  let r = Math.random() * ENEMY_TOTAL_WEIGHT;
  for (const e of ENEMY_TYPES) { r -= e.weight; if (r <= 0) return e; }
  return ENEMY_TYPES[0];
}

/* ----------------------------------------------------------------
   PARTICLES — emitters
---------------------------------------------------------------- */
function emitSlash(x, y, count, color='#ffffff', isCrit=false) {
  const num = isCrit ? count * 2 : count;
  for (let i = 0; i < num; i++) {
    const p = particlePool.acquire();
    if (!p) break;
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * (isCrit ? 8 : 5);
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.size = isCrit ? 2 + Math.random() * 5 : 1.5 + Math.random() * 3.5;
    p.alpha = 1;
    p.decay = 0.025 + Math.random() * 0.04;
    p.color = isCrit ? '#ffd700' : color;
    p.shape = i < 3 ? 'slash' : 'circle';
    p.rotation = Math.random() * Math.PI * 2;
    p.rotSpeed = (Math.random() - 0.5) * 0.3;
  }
}

function emitBlood(x, y) {
  for (let i = 0; i < 8; i++) {
    const p = particlePool.acquire();
    if (!p) break;
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
    p.x = x; p.y = y;
    p.vx = Math.cos(angle) * (1 + Math.random() * 4);
    p.vy = Math.sin(angle) * (1 + Math.random() * 4);
    p.size = 3 + Math.random() * 4;
    p.alpha = 0.9;
    p.decay = 0.018;
    p.color = '#cc1133';
    p.shape = 'circle';
    p.rotation = 0; p.rotSpeed = 0;
  }
}

function emitSkillWave(cx, cy) {
  for (let i = 0; i < 40; i++) {
    const p = particlePool.acquire();
    if (!p) break;
    const angle = (i / 40) * Math.PI * 2;
    const speed = 4 + Math.random() * 10;
    p.x = cx; p.y = cy;
    p.vx = Math.cos(angle) * speed;
    p.vy = Math.sin(angle) * speed;
    p.size = 2 + Math.random() * 6;
    p.alpha = 1;
    p.decay = 0.02;
    p.color = i % 2 === 0 ? '#00e5ff' : '#ffffff';
    p.shape = 'star';
    p.rotation = Math.random() * Math.PI;
    p.rotSpeed = (Math.random() - 0.5) * 0.2;
  }
}

function spawnFloatText(x, y, text, color, size=20) {
  const t = textPool.acquire();
  if (!t) return;
  t.x = x; t.y = y - 20;
  t.text = text;
  t.color = color;
  t.alpha = 1;
  t.size = size;
  t.life = 0;
  t.maxLife = 55;
  t.vy = -1.6;
}

/* ----------------------------------------------------------------
   SCREEN SHAKE
---------------------------------------------------------------- */
let shakeX = 0, shakeY = 0, shakeDecay = 0;

function triggerShake(intensity=6) {
  shakeX = (Math.random() - 0.5) * intensity * 2;
  shakeY = (Math.random() - 0.5) * intensity * 2;
  shakeDecay = intensity * 0.12;
}

function updateShake() {
  if (Math.abs(shakeX) > 0.3 || Math.abs(shakeY) > 0.3) {
    shakeX *= 0.72;
    shakeY *= 0.72;
    wrap.style.setProperty('--shake-x', shakeX.toFixed(2) + 'px');
    wrap.style.setProperty('--shake-y', shakeY.toFixed(2) + 'px');
  } else {
    shakeX = shakeY = 0;
    wrap.style.setProperty('--shake-x', '0px');
    wrap.style.setProperty('--shake-y', '0px');
  }
}

/* ----------------------------------------------------------------
   ENEMY SPAWNING
---------------------------------------------------------------- */
function getSpawnInterval() {
  const min   = CFG.SPAWN_MIN[gs.difficulty];
  const accel = CFG.SPAWN_ACCEL[gs.difficulty];
  return Math.max(min, CFG.SPAWN_BASE - gs.elapsed * accel);
}

function spawnEnemy(typeOverride=null) {
  const e = enemyPool.acquire();
  if (!e) return;

  const type = typeOverride || pickEnemyType();
  const margin = type.size;

  // Spawn from one of 4 edges
  const edge = Math.floor(Math.random() * 4);
  let sx, sy;
  if      (edge === 0) { sx = margin + Math.random()*(W-margin*2); sy = -margin; }
  else if (edge === 1) { sx = W+margin;  sy = margin + Math.random()*(H-margin*2); }
  else if (edge === 2) { sx = margin + Math.random()*(W-margin*2); sy = H+margin; }
  else                 { sx = -margin;   sy = margin + Math.random()*(H-margin*2); }

  // Target: slightly off-center to avoid always aiming at exact center
  const tx = W/2 + (Math.random()-0.5)*120;
  const ty = H/2 + (Math.random()-0.5)*180;
  const dist = Math.hypot(tx-sx, ty-sy);
  const speedMult = gs.difficulty === 'hard' ? 1.5 : gs.difficulty === 'normal' ? 1.2 : 1.0;
  const speed = type.baseSpeed * speedMult * (1 + gs.elapsed / 60000 * 0.5);

  e.x = sx; e.y = sy;
  e.vx = (tx-sx)/dist * speed;
  e.vy = (ty-sy)/dist * speed;
  e.hp = type.hpMax;
  e.hpMax = type.hpMax;
  e.type = type;
  e.size = type.size;
  e.angle = Math.random() * Math.PI * 2;
  e.spinSpeed = (Math.random()-0.5) * 0.06;
  e.spawnTime = gs.elapsed;
  e.flashTimer = 0;
  e.deathTimer = 0;
  e.dying = false;
}

/* ----------------------------------------------------------------
   HIT DETECTION — returns true if (px, py) hits enemy e
---------------------------------------------------------------- */
function hitTest(e, px, py) {
  const r = e.size * 0.55;
  return Math.hypot(px - e.x, py - e.y) < r;
}

/* ----------------------------------------------------------------
   COMBO SYSTEM
---------------------------------------------------------------- */
function getComboMultiplier(combo) {
  if (combo < 3)  return 1;
  if (combo < 6)  return 1.5;
  if (combo < 10) return 2;
  if (combo < 15) return 3;
  return 5;
}

function addCombo() {
  gs.combo++;
  gs.comboTimer = CFG.COMBO_TIMEOUT;
  if (gs.combo > gs.maxCombo) gs.maxCombo = gs.combo;

  // Milestone sounds
  if ([5, 10, 15, 20].includes(gs.combo)) Audio.comboMilestone();

  updateComboHUD();
}

function resetCombo() {
  if (gs.combo >= 3) {
    // Brief visual indicator
    spawnFloatText(W/2, H*0.4, 'COMBO BREAK', '#ff4466', 14);
  }
  gs.combo = 0;
  gs.comboTimer = 0;
  updateComboHUD();
}

/* ----------------------------------------------------------------
   SKILL: 瞬殺斬 (Instant Kill Wave)
---------------------------------------------------------------- */
function activateSkill() {
  if (gs.skillCooldown > 0) return;
  gs.skillCooldown = CFG.SKILL_COOLDOWN;
  gs.skillIsCharging = false;

  Audio.skill();
  emitSkillWave(W/2, H/2);
  triggerShake(14);

  // Flash overlay
  skillFlash.style.transition = 'opacity 0.05s';
  skillFlash.style.opacity = '0.7';
  setTimeout(()=>{ skillFlash.style.transition = 'opacity 0.3s'; skillFlash.style.opacity = '0'; }, 80);

  // Kill all non-boss enemies, deal 2 dmg to boss
  let killed = 0;
  for (const e of [...enemyPool.list]) {
    if (!e.dying) {
      if (e.type.isBoss) {
        e.hp = Math.max(0, e.hp - 2);
        if (e.hp <= 0) {
          killEnemy(e, true, true);
          killed++;
        } else {
          e.flashTimer = 300;
        }
      } else {
        killEnemy(e, true, true);
        killed++;
      }
    }
  }

  if (killed > 0) {
    spawnFloatText(W/2, H/2 - 40, `SKILL +${killed * 80}`, '#00e5ff', 22);
    gs.score += killed * 80;
    updateScoreHUD(true);
  }
}

/* ----------------------------------------------------------------
   KILL ENEMY (shared logic)
---------------------------------------------------------------- */
function killEnemy(e, isCrit=false, isSkill=false) {
  e.dying = true;
  e.deathTimer = 350;

  const pts = Math.floor(
    e.type.scoreBase
    * getComboMultiplier(gs.combo)
    * CFG.DIFF_SCORE_MULT[gs.difficulty]
    * (isCrit ? 2 : 1)
  );

  gs.score += pts;
  gs.slayed++;
  if (isCrit) gs.crits++;

  emitSlash(e.x, e.y, isCrit ? 24 : 14, e.type.color, isCrit);
  if (!isSkill) emitBlood(e.x, e.y);

  const textColor = e.type.isBoss ? '#ff2244' : isCrit ? '#ffd700' : '#ffffff';
  const textSize  = e.type.isBoss ? 28 : isCrit ? 24 : 18;
  spawnFloatText(e.x, e.y - e.size/2, `+${pts.toLocaleString()}`, textColor, textSize);
  if (isCrit) spawnFloatText(e.x, e.y - e.size/2 - 28, 'CRITICAL!', '#ffd700', 16);

  if (!isSkill) addCombo();
  updateScoreHUD(isCrit);

  if (e.type.isBoss) {
    gs.bossActive = false;
    triggerShake(18);
  } else {
    triggerShake(isCrit ? 10 : 6);
  }
}

/* ----------------------------------------------------------------
   TAKE DAMAGE
---------------------------------------------------------------- */
function takeDamage(e) {
  gs.hp = Math.max(0, gs.hp - 1);
  resetCombo();
  triggerShake(20);
  Audio.miss();
  updateHpHUD();

  // Slow time when HP critically low
  if (gs.hp <= 1 && !gs.slowActive) {
    gs.slowActive = true;
    gs.slowTimer = CFG.SLOW_DURATION;
    slowOverlay.classList.add('active');
    Audio.slowTime();
    spawnFloatText(W/2, H*0.35, '時間停滞', '#aa44ff', 20);
  }

  if (gs.hp <= 0) {
    triggerGameOver();
  }
}

/* ----------------------------------------------------------------
   RANK BADGE
---------------------------------------------------------------- */
function getRankBadge(score, diff) {
  const thresholds = {
    easy:   [500, 1500, 4000, 8000],
    normal: [800, 2500, 6000, 12000],
    hard:   [1200, 3500, 9000, 20000],
  };
  const names = ['C RANK', 'B RANK', 'A RANK', 'S RANK', '★ SS RANK ★'];
  const t = thresholds[diff];
  if (score >= t[3]) return names[4];
  if (score >= t[2]) return names[3];
  if (score >= t[1]) return names[2];
  if (score >= t[0]) return names[1];
  return names[0];
}

/* ----------------------------------------------------------------
   LOCAL STORAGE RANKING
---------------------------------------------------------------- */
const LS_KEY = 'ninjaSlave_v1_scores';

function loadScores() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || []; }
  catch { return []; }
}

function saveScore() {
  const scores = loadScores();
  scores.push({ score: gs.score, diff: gs.difficulty, time: gs.elapsed });
  scores.sort((a,b) => b.score - a.score);
  scores.splice(5); // keep top 5
  try { localStorage.setItem(LS_KEY, JSON.stringify(scores)); } catch {}
  return scores;
}

function renderRankingList() {
  const scores = loadScores();
  const list   = document.getElementById('ranking-list');
  list.innerHTML = '';
  if (scores.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:var(--c-dim);font-size:12px;padding:8px;">-- NO RECORD --</div>';
    return;
  }
  let isNewRecord = false;
  scores.forEach((s, i) => {
    const row = document.createElement('div');
    const isCurrent = (s.score === gs.score && s.diff === gs.difficulty && !isNewRecord);
    if (isCurrent) isNewRecord = true;
    row.className = 'ranking-row' + (isCurrent ? ' current-run' : '');
    row.innerHTML = `
      <span class="rank-num">${i+1}.</span>
      <span class="rank-score">${s.score.toLocaleString()}</span>
      <span class="rank-diff">${s.diff.toUpperCase()}</span>
    `;
    list.appendChild(row);
  });

  // New record flash
  if (isNewRecord && scores[0].score === gs.score) {
    const flash = document.createElement('div');
    flash.className = 'new-record-flash';
    flash.textContent = '★ NEW RECORD ★';
    document.getElementById('screen-result').appendChild(flash);
    setTimeout(() => flash.remove(), 2100);
  }
}

function renderTitleRanking() {
  const scores = loadScores();
  const el = document.getElementById('title-ranking-preview');
  if (scores.length === 0) {
    el.innerHTML = '<span>BEST SCORES</span>-- NO RECORD --';
    return;
  }
  let html = '<span>BEST SCORES</span>';
  scores.slice(0,3).forEach((s, i) => {
    html += `${i+1}. ${s.score.toLocaleString()} <small style="opacity:.5">${s.diff.toUpperCase()}</small>&nbsp;&nbsp;`;
  });
  el.innerHTML = html;
}

  e.stopPropagation();
  if (gameState !== STATE.PLAYING) return;
  if (gs.skillCooldown > 0) return;
  gs.skillIsCharging = true;
  gs.skillChargeStart = performance.now();
});

// Skill release — handled in document pointerup

/* ----------------------------------------------------------------
   MAIN TAP HANDLER (game canvas)
---------------------------------------------------------------- */
document.getElementById('game-wrap').addEventListener('pointerdown', e => {
  if (gameState !== STATE.PLAYING) return;

  Audio.init();

  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const px = (e.clientX - rect.left) * scaleX;
  const py = (e.clientY - rect.top)  * scaleY;

  let hitAny = false;

  // Check each active enemy (hit strongest/largest first)
  const sorted = [...enemyPool.list].sort((a,b) => b.size - a.size);
  for (const en of sorted) {
    if (en.dying) continue;
    if (!hitTest(en, px, py)) continue;

    const isCrit = Math.random() < CFG.CRIT_CHANCE;
    Audio.hit(gs.combo);
    if (isCrit) Audio.crit();

    if (en.type.isBoss) {
      en.hp--;
      en.flashTimer = 180;
      if (en.hp <= 0) {
        killEnemy(en, isCrit);
      } else {
        // Boss partial hit
        triggerShake(7);
        emitSlash(en.x, en.y, 10, en.type.color, isCrit);
        const pts = Math.floor(80 * CFG.DIFF_SCORE_MULT[gs.difficulty] * (isCrit?2:1));
        gs.score += pts;
        spawnFloatText(en.x, en.y - en.size/2, `+${pts}`, '#ff2244', 16);
        addCombo();
        updateScoreHUD(isCrit);
        if (isCrit) Audio.crit();
      }
    } else {
      killEnemy(en, isCrit);
    }

    hitAny = true;
    break; // one tap = one enemy
  }

  // Miss-tap (tapped empty space)
  if (!hitAny) {
    // Only penalize if not within grace period
    // Small visual feedback: miss ripple
    emitSlash(px, py, 4, '#444466');
  }
});

/* ----------------------------------------------------------------
   POINTER UP — finalize skill charge
---------------------------------------------------------------- */
document.addEventListener('pointerup', e => {
  if (gameState !== STATE.PLAYING) return;
  if (!gs.skillIsCharging) return;

  const held = performance.now() - gs.skillChargeStart;
  gs.skillIsCharging = false;

  if (held >= CFG.SKILL_CHARGE_TIME) {
    activateSkill();
  }
  skillBtn.querySelector('.skill-label').textContent = 'SKILL';
});

/* ----------------------------------------------------------------
   BUTTONS
---------------------------------------------------------------- */
document.getElementById('start-btn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  Audio.init();
  Audio.uiTap();
  startGame();
});

document.getElementById('retry-btn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  Audio.init();
  Audio.uiTap();
  restartGame();
});

document.getElementById('title-back-btn').addEventListener('pointerdown', e => {
  e.stopPropagation();
  Audio.init();
  Audio.uiTap();
  goToTitle();
});

/* ----------------------------------------------------------------
   GAME FLOW FUNCTIONS
---------------------------------------------------------------- */
function startGame() {
  document.getElementById('screen-title').classList.remove('active');
  document.getElementById('hud').style.display = '';
  enemyPool.releaseAll();
  particlePool.releaseAll();
  textPool.releaseAll();

  initGameData(selectedDiff);
  updateHpHUD();
  updateComboHUD();
  updateScoreHUD();
  updateTimerHUD();
  gameState = STATE.PLAYING;
}

function restartGame() {
  document.getElementById('screen-result').classList.remove('active');
  // Remove any lingering new-record flash
  document.querySelectorAll('.new-record-flash').forEach(el=>el.remove());
  startGame();
}

function goToTitle() {
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('hud').style.display = 'none';
  gameState = STATE.TITLE;
  renderTitleRanking();
  document.getElementById('screen-title').classList.add('active');
  enemyPool.releaseAll();
  particlePool.releaseAll();
  textPool.releaseAll();
}

/* ----------------------------------------------------------------
   BACKGROUND RENDERING
---------------------------------------------------------------- */
// Pre-render static background
let bgCache = null;

function renderBackground() {
  if (!bgCache || bgCache.width !== W || bgCache.height !== H) {
    const oc = document.createElement('canvas');
    oc.width = W; oc.height = H;
    const ox = oc.getContext('2d');

    // Dark gradient base
    const grad = ox.createRadialGradient(W/2, H*0.4, 0, W/2, H*0.4, Math.max(W,H)*0.8);
    grad.addColorStop(0, '#16101a');
    grad.addColorStop(1, '#080810');
    ox.fillStyle = grad;
    ox.fillRect(0, 0, W, H);

    // Subtle grid
    ox.strokeStyle = 'rgba(255,255,255,0.02)';
    ox.lineWidth = 1;
    const gridSize = 40;
    for (let x = 0; x < W; x += gridSize) {
      ox.beginPath(); ox.moveTo(x, 0); ox.lineTo(x, H); ox.stroke();
    }
    for (let y = 0; y < H; y += gridSize) {
      ox.beginPath(); ox.moveTo(0, y); ox.lineTo(W, y); ox.stroke();
    }

    // Circle decorations
    ox.strokeStyle = 'rgba(255,34,68,0.04)';
    ox.lineWidth = 1;
    [0.3, 0.5, 0.7].forEach(r => {
      ox.beginPath();
      ox.arc(W/2, H/2, Math.min(W,H)*r, 0, Math.PI*2);
      ox.stroke();
    });

    bgCache = oc;
  }
  ctx2d.drawImage(bgCache, 0, 0);
}

/* ----------------------------------------------------------------
   ENEMY RENDERING
---------------------------------------------------------------- */
function renderEnemy(e) {
  const alpha = e.dying ? Math.max(0, e.deathTimer / 350) : 1;
  if (alpha <= 0) return;

  ctx2d.save();
  ctx2d.globalAlpha = alpha;
  ctx2d.translate(e.x, e.y);
  ctx2d.rotate(e.angle);

  const r = e.size / 2;
  const col = e.type.color;

  // Flash white when hit
  const renderCol = (e.flashTimer > 0) ? '#ffffff' : col;

  // Boss — octagon shape
  if (e.type.isBoss) {
    const sides = 8;
    ctx2d.beginPath();
    for (let i = 0; i < sides; i++) {
      const a = (i / sides) * Math.PI * 2 - Math.PI / 8;
      i === 0 ? ctx2d.moveTo(Math.cos(a)*r, Math.sin(a)*r)
              : ctx2d.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx2d.closePath();
    ctx2d.fillStyle = '#1a0010';
    ctx2d.fill();
    ctx2d.strokeStyle = renderCol;
    ctx2d.lineWidth = 3;
    ctx2d.stroke();

    // Glow
    ctx2d.shadowColor = renderCol;
    ctx2d.shadowBlur  = 20 + Math.sin(Date.now()*0.008)*8;
    ctx2d.strokeStyle = renderCol;
    ctx2d.lineWidth   = 1.5;
    ctx2d.stroke();
    ctx2d.shadowBlur  = 0;

    // HP bar
    ctx2d.rotate(-e.angle);
    const barW = r * 1.6;
    const barH = 5;
    const barX = -barW/2;
    const barY = r + 6;
    ctx2d.fillStyle = '#331122';
    ctx2d.fillRect(barX, barY, barW, barH);
    ctx2d.fillStyle = renderCol;
    ctx2d.fillRect(barX, barY, barW * (e.hp / e.hpMax), barH);
    ctx2d.rotate(e.angle);
  } else {
    // Normal enemy — diamond shape
    ctx2d.beginPath();
    ctx2d.moveTo(0, -r);
    ctx2d.lineTo(r*0.7, 0);
    ctx2d.lineTo(0, r);
    ctx2d.lineTo(-r*0.7, 0);
    ctx2d.closePath();
    ctx2d.fillStyle = 'rgba(10,10,20,0.9)';
    ctx2d.fill();
    ctx2d.strokeStyle = renderCol;
    ctx2d.lineWidth = 2;
    ctx2d.stroke();

    // Inner diamond glow
    if (e.flashTimer <= 0) {
      ctx2d.beginPath();
      ctx2d.moveTo(0, -r*0.5);
      ctx2d.lineTo(r*0.35, 0);
      ctx2d.lineTo(0, r*0.5);
      ctx2d.lineTo(-r*0.35, 0);
      ctx2d.closePath();
      ctx2d.fillStyle = col + '33';
      ctx2d.fill();
    }

    // HP indicator for heavy enemy
    if (e.hpMax > 1 && e.hp < e.hpMax) {
      ctx2d.rotate(-e.angle);
      ctx2d.fillStyle = '#ff4400';
      ctx2d.beginPath();
      ctx2d.arc(0, -r - 8, 4, 0, Math.PI*2);
      ctx2d.fill();
      ctx2d.rotate(e.angle);
    }
  }

  // Label
  ctx2d.rotate(-e.angle);
  ctx2d.font = `bold ${Math.round(r * 0.75)}px 'Hiragino Mincho ProN', serif`;
  ctx2d.textAlign = 'center';
  ctx2d.textBaseline = 'middle';
  ctx2d.fillStyle = e.flashTimer > 0 ? '#000' : '#fff';
  ctx2d.globalAlpha = alpha;
  ctx2d.fillText(e.type.label, 0, 1);

  ctx2d.restore();
}

/* ----------------------------------------------------------------
   PARTICLE RENDERING
---------------------------------------------------------------- */
function renderParticle(p) {
  ctx2d.save();
  ctx2d.globalAlpha = p.alpha;
  ctx2d.translate(p.x, p.y);

  if (p.shape === 'slash') {
    ctx2d.rotate(p.rotation);
    ctx2d.strokeStyle = p.color;
    ctx2d.lineWidth = p.size * 0.5;
    ctx2d.lineCap = 'round';
    ctx2d.beginPath();
    ctx2d.moveTo(-p.size, 0);
    ctx2d.lineTo(p.size, 0);
    ctx2d.stroke();
  } else if (p.shape === 'star') {
    ctx2d.rotate(p.rotation);
    ctx2d.fillStyle = p.color;
    const s = p.size;
    ctx2d.beginPath();
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2;
      const b = a + Math.PI / 4;
      ctx2d.lineTo(Math.cos(a)*s, Math.sin(a)*s);
      ctx2d.lineTo(Math.cos(b)*s*0.4, Math.sin(b)*s*0.4);
    }
    ctx2d.closePath();
    ctx2d.fill();
  } else {
    ctx2d.fillStyle = p.color;
    ctx2d.beginPath();
    ctx2d.arc(0, 0, p.size, 0, Math.PI * 2);
    ctx2d.fill();
  }

  ctx2d.restore();
}

/* ----------------------------------------------------------------
   MAIN UPDATE LOOP
---------------------------------------------------------------- */
let lastTime = 0;
let titleAnimFrame = 0;

function update(dt) {
  // dt in ms, real time
  const effectiveDt = dt * gs.timeScale;

  // Time scale update (slow-time)
  if (gs.slowActive) {
    gs.slowTimer -= dt;
    gs.timeScale = CFG.SLOW_FACTOR;
    if (gs.slowTimer <= 0) {
      gs.slowActive = false;
      gs.timeScale = 1;
      slowOverlay.classList.remove('active');
    }
  } else {
    gs.timeScale = 1;
  }

  // Game time
  gs.elapsed += effectiveDt;

  // Combo timer
  if (gs.combo > 0) {
    gs.comboTimer -= effectiveDt;
    if (gs.comboTimer <= 0) resetCombo();
  }

  // Skill cooldown
  if (gs.skillCooldown > 0) {
    gs.skillCooldown = Math.max(0, gs.skillCooldown - dt);
  }

  // Boss warning timer
  if (bossWarnTimer > 0) {
    bossWarnTimer -= dt;
    if (bossWarnTimer <= 0) {
      bossWarning.style.opacity = '0';
    }
  }

  // Enemy spawn
  gs.spawnTimer -= effectiveDt;
  if (gs.spawnTimer <= 0) {
    spawnEnemy();
    gs.spawnTimer = getSpawnInterval();
    // Extra spawns in hard mode at high time
    if (gs.difficulty === 'hard' && gs.elapsed > 30000 && Math.random() < 0.3) {
      spawnEnemy();
    }
  }

  // Boss spawn
  if (!gs.bossActive) {
    gs.bossTimer += effectiveDt;
    if (gs.bossTimer >= CFG.BOSS_INTERVAL) {
      gs.bossTimer = 0;
      gs.bossActive = true;
      spawnEnemy(BOSS_TYPE);
      showBossWarning();
      Audio.bossAppear();
      triggerShake(10);
    }
  }

  // Update enemies
  for (const e of [...enemyPool.list]) {
    if (e.dying) {
      e.deathTimer -= dt;
      if (e.deathTimer <= 0) enemyPool.release(e);
      continue;
    }

    e.x += e.vx * effectiveDt / 16;
    e.y += e.vy * effectiveDt / 16;
    e.angle += e.spinSpeed * effectiveDt / 16;
    if (e.flashTimer > 0) e.flashTimer -= dt;

    // Enemy reaches player zone (center)
    const dist = Math.hypot(e.x - W/2, e.y - H/2);
    const hitZone = e.size * 0.5 + 30;
    if (dist < hitZone && gs.elapsed - e.spawnTime > CFG.MISS_GRACE) {
      enemyPool.release(e);
      takeDamage(e);
      return; // re-entrancy guard
    }

    // Out of bounds (missed spawn edge)
    if (e.x < -200 || e.x > W+200 || e.y < -200 || e.y > H+200) {
      enemyPool.release(e);
    }
  }

  // Update particles
  for (const p of [...particlePool.list]) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08; // gravity
    p.vx *= 0.96;
    p.alpha -= p.decay;
    p.rotation += p.rotSpeed;
    if (p.alpha <= 0) particlePool.release(p);
  }

  // Update float texts
  for (const t of [...textPool.list]) {
    t.y += t.vy;
    t.life++;
    if (t.life > t.maxLife * 0.6) {
      t.alpha = 1 - (t.life - t.maxLife * 0.6) / (t.maxLife * 0.4);
    }
    if (t.life >= t.maxLife) textPool.release(t);
  }

  // HUD updates (throttled by importance)
  updateTimerHUD();
  updateSkillHUD(dt);
  updateShake();
}

/* ----------------------------------------------------------------
   RENDER LOOP
---------------------------------------------------------------- */
function render() {
  ctx2d.clearRect(0, 0, W, H);
  renderBackground();

  if (gameState !== STATE.PLAYING) return;

  // Player indicator (center)
  const pCenterAlpha = 0.35 + Math.sin(Date.now()*0.004)*0.12;
  ctx2d.save();
  ctx2d.globalAlpha = pCenterAlpha;
  ctx2d.strokeStyle = '#ffffff';
  ctx2d.lineWidth = 1;
  ctx2d.setLineDash([4,6]);
  ctx2d.beginPath();
  ctx2d.arc(W/2, H/2, 28, 0, Math.PI*2);
  ctx2d.stroke();
  ctx2d.setLineDash([]);
  ctx2d.restore();

  // Render particles (behind enemies)
  for (const p of particlePool.list) renderParticle(p);

  // Render enemies
  for (const e of enemyPool.list) renderEnemy(e);

  // Render float texts
  for (const t of textPool.list) {
    ctx2d.save();
    ctx2d.globalAlpha = t.alpha;
    ctx2d.font = `bold ${t.size}px 'Hiragino Mincho ProN', serif`;
    ctx2d.textAlign = 'center';
    ctx2d.textBaseline = 'middle';
    // Slight outline for readability
    ctx2d.strokeStyle = 'rgba(0,0,0,0.7)';
    ctx2d.lineWidth = 3;
    ctx2d.strokeText(t.text, t.x, t.y);
    ctx2d.fillStyle = t.color;
    ctx2d.fillText(t.text, t.x, t.y);
    ctx2d.restore();
  }

  // Combo bar (bottom of screen, shows combo timeout remaining)
  if (gs.combo >= 2 && gs.comboTimer > 0) {
    const barW = W * 0.5;
    const barX = (W - barW) / 2;
    const barY = H - 110;
    const progress = gs.comboTimer / CFG.COMBO_TIMEOUT;
    ctx2d.save();
    ctx2d.globalAlpha = 0.6;
    ctx2d.fillStyle = '#222';
    ctx2d.fillRect(barX, barY, barW, 3);
    ctx2d.fillStyle = '#ff7722';
    ctx2d.fillRect(barX, barY, barW * progress, 3);
    ctx2d.restore();
  }

  // Multiplier badge
  const mult = getComboMultiplier(gs.combo);
  if (mult > 1) {
    ctx2d.save();
    ctx2d.globalAlpha = 0.9;
    ctx2d.font = 'bold 14px "SF Mono", monospace';
    ctx2d.textAlign = 'right';
    ctx2d.fillStyle = '#ff7722';
    ctx2d.fillText(`×${mult}`, W - 28, H - 90);
    ctx2d.restore();
  }
}

/* ----------------------------------------------------------------
   TITLE SCREEN ANIMATION (canvas bg)
---------------------------------------------------------------- */
function renderTitleBg() {
  ctx2d.clearRect(0, 0, W, H);
  renderBackground();

  // Animated kanji marks drifting
  titleAnimFrame++;
  const chars = ['忍','殺','斬','武','刀','鬼'];
  ctx2d.font = 'bold 24px serif';
  ctx2d.textAlign = 'center';

  for (let i = 0; i < 8; i++) {
    const seed = i * 1.37;
    const x = ((Math.sin(seed * 3.1 + titleAnimFrame * 0.003) + 1)/2) * W;
    const y = ((H * 0.15 * i / 8) + titleAnimFrame * 0.15 * (0.5 + (i%3)*0.3)) % H;
    const alpha = 0.04 + Math.sin(seed + titleAnimFrame * 0.01) * 0.02;
    ctx2d.save();
    ctx2d.globalAlpha = Math.max(0.01, alpha);
    ctx2d.fillStyle = '#ff2244';
    ctx2d.fillText(chars[i % chars.length], x, y);
    ctx2d.restore();
  }
}

/* ----------------------------------------------------------------
   MAIN RAF LOOP
---------------------------------------------------------------- */
function loop(timestamp) {
  const dt = Math.min(timestamp - lastTime, 50); // cap at 50ms
  lastTime = timestamp;

  if (gameState === STATE.PLAYING) {
    update(dt);
    render();
  } else if (gameState === STATE.TITLE) {
    renderTitleBg();
  } else if (gameState === STATE.RESULT) {
    renderBackground();
  }

  requestAnimationFrame(loop);
}

/* ----------------------------------------------------------------
   INIT
---------------------------------------------------------------- */
function init() {
  renderTitleRanking();
  document.getElementById('screen-title').classList.add('active');
  document.getElementById('hud').style.display = 'none';
  requestAnimationFrame(ts => { lastTime = ts; loop(ts); });
}

init();
</script>
</body>
